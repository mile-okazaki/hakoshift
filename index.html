              {staff.map(s => {
                const pattern = aiSettings.weeklyPatterns?.[s.id];
                const hasPattern = !!pattern;
                const fixedOffs = s.fixedDayOff || [];
                const team = s.teamId && teamById[s.teamId];
                return (
                  <div key={s.id} className="bg-zinc-900 rounded-lg p-2.5" style={team ? { borderLeftWidth: '3px', borderLeftColor: team.color, borderLeftStyle: 'solid' } : {}}>
                    <div className="flex items-center justify-between mb-2">
                      <div>
                        <div className="text-sm font-medium text-zinc-100 flex items-center gap-1">{team && <span className="w-1.5 h-1.5 rounded-full" style={{ background: team.color }}></span>}{s.name}</div>
                        <div className="text-[10px] text-zinc-500 flex flex-wrap gap-1">
                          {team && <span>{team.name} ・</span>}
                          {fixedOffs.length > 0 && <span className="text-zinc-400"><Icon name="Repeat" className="w-2.5 h-2.5 inline" /> 固定休: {fixedOffs.map(dow => DOW[dow]).join('・')}</span>}
                          {hasPattern && <span>・曜日パターン適用中</span>}
                          {!hasPattern && <span>・デフォルト: {shiftTypes.find(st => st.id === s.defaultShiftType)?.name || '未設定'}</span>}
                        </div>
                      </div>
                      <div className="flex gap-1">
                        <button onClick={() => setEditingPattern(s)} className="text-[11px] px-2 py-1 bg-zinc-700 hover:bg-amber-600 text-zinc-300 hover:text-white rounded">{hasPattern ? '編集' : '設定'}</button>
                        {hasPattern && <button onClick={() => clearPattern(s.id)} className="text-[11px] px-2 py-1 bg-zinc-700 hover:bg-red-600 text-zinc-300 hover:text-white rounded">解除</button>}
                      </div>
                    </div>
                    {hasPattern && (
                      <div className="grid grid-cols-7 gap-1 text-center">
                        {DOW.map((d, dow) => {
                          const stId = pattern[dow];
                          const st = shiftTypes.find(t => t.id === stId);
                          const isFixed = fixedOffs.includes(dow);
                          return (
                            <div key={dow} className="text-[10px]">
                              <div className={`font-semibold ${dow === 0 ? 'text-red-400' : dow === 6 ? 'text-blue-400' : 'text-zinc-400'}`}>{d}</div>
                              <div className="mt-0.5 px-0.5 py-0.5 rounded text-white text-[9px] truncate" style={{ background: isFixed ? '#3f3f46' : (st?.color || '#3f3f46'), opacity: isFixed ? 0.6 : 1 }}>
                                {isFixed ? '固' : (st?.name || '休')}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </section>
      {editingPattern && (
        <PatternEditModal staff={editingPattern} shiftTypes={shiftTypes}
          currentPattern={aiSettings.weeklyPatterns?.[editingPattern.id] || {}}
          onSave={async (p) => { await updatePattern(editingPattern.id, p); setEditingPattern(null); }}
          onClose={() => setEditingPattern(null)} />
      )}
    </div>
  );
}

function PatternEditModal({ staff, shiftTypes, currentPattern, onSave, onClose }) {
  const [pattern, setPattern] = useState(() => {
    const p = {}; for (let i = 0; i < 7; i++) p[i] = currentPattern[i] !== undefined ? currentPattern[i] : null; return p;
  });
  const fixedOffs = staff.fixedDayOff || [];
  const handleSetDay = (dow, stId) => setPattern({ ...pattern, [dow]: stId });
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
      <div className="bg-zinc-800 border border-zinc-700 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between p-4 border-b border-zinc-700">
          <div><h3 className="font-semibold text-zinc-100">{staff.name}</h3><p className="text-xs text-zinc-400">曜日別パターン設定</p></div>
          <button onClick={onClose} className="p-1.5 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-5 h-5 text-zinc-300" /></button>
        </div>
        <div className="p-4 space-y-3 overflow-y-auto">
          {fixedOffs.length > 0 && (
            <div className="bg-zinc-900 border border-zinc-700 rounded-lg p-2 text-[11px] text-zinc-400">
              <Icon name="Repeat" className="w-3 h-3 inline mr-1" />固定休み（{fixedOffs.map(dow => DOW[dow]).join('・')}）が優先されます
            </div>
          )}
          {DOW.map((d, dow) => {
            const isFixed = fixedOffs.includes(dow);
            return (
              <div key={dow} className={isFixed ? 'opacity-50' : ''}>
                <div className={`text-xs font-semibold mb-1 flex items-center gap-1 ${dow === 0 ? 'text-red-400' : dow === 6 ? 'text-blue-400' : 'text-zinc-300'}`}>
                  {d}曜日{isFixed && <span className="text-[10px] text-zinc-500">（固定休み）</span>}
                </div>
                <div className="grid grid-cols-2 gap-1.5">
                  <button onClick={() => handleSetDay(dow, null)} disabled={isFixed}
                    className={`p-2 rounded-lg text-xs ${pattern[dow] === null ? 'bg-zinc-600 text-white' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-700'}`}>公休</button>
                  {shiftTypes.map(st => {
                    const selected = pattern[dow] === st.id;
                    return (
                      <button key={st.id} onClick={() => handleSetDay(dow, st.id)} disabled={isFixed}
                        className={`p-2 rounded-lg text-xs ${selected ? 'text-white ring-2 ring-offset-2 ring-offset-zinc-800' : 'bg-zinc-900 text-zinc-300 hover:bg-zinc-700'}`}
                        style={selected ? { background: st.color, '--tw-ring-color': st.color } : {}}>{st.name}</button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div className="p-4 border-t border-zinc-700 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 border border-zinc-700 text-zinc-300 rounded-lg text-sm font-medium hover:bg-zinc-700">キャンセル</button>
          <button onClick={() => onSave(pattern)} className="flex-1 py-2 bg-amber-600 text-white rounded-lg text-sm font-semibold hover:bg-amber-700"><Icon name="Save" className="w-4 h-4 inline mr-1" />保存</button>
        </div>
      </div>
    </div>
  );
}

// ========== スタッフ管理 ==========
function StaffView({ staff, setStaff, shiftTypes, areas, setAreas, roles, setRoles, teams }) {
  const dialog = useDialog();
  const [editing, setEditing] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [filterTeamId, setFilterTeamId] = useState('all');
  const teamById = useMemo(() => { const m = {}; teams.forEach(t => m[t.id] = t); return m; }, [teams]);
  const filtered = useMemo(() => {
    let list = staff;
    if (filterTeamId === 'none') list = list.filter(s => !s.teamId || !teamById[s.teamId]);
    else if (filterTeamId !== 'all') list = list.filter(s => s.teamId === filterTeamId);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(s => s.name.toLowerCase().includes(q) || (s.role || '').toLowerCase().includes(q) || (s.vehicle || '').toLowerCase().includes(q) || (s.area || '').toLowerCase().includes(q));
    }
    return list;
  }, [staff, searchQuery, filterTeamId, teamById]);

  const handleSave = async (data) => {
    if (data.id && staff.find(s => s.id === data.id)) await setStaff(staff.map(s => s.id === data.id ? data : s));
    else await setStaff([...staff, { ...data, id: data.id || newId() }]);
    if (data.role && !roles.includes(data.role)) await setRoles([...roles, data.role]);
    if (data.area && !areas.includes(data.area)) await setAreas([...areas, data.area]);
    setEditing(null);
  };
  const handleDelete = async (s) => {
    const ok = await dialog.confirm({ title: 'スタッフ削除', message: `「${s.name}」を削除します。\nこのスタッフのシフト・希望休も影響を受けます。`, confirmText: '削除する' });
    if (!ok) return;
    await setStaff(staff.filter(x => x.id !== s.id));
  };

  return (
    <div className="px-3 pt-3 space-y-3">
      <div className="flex items-center justify-between gap-2">
        <h2 className="text-lg font-semibold flex items-center gap-2 text-zinc-100"><Icon name="Users" className="w-5 h-5" />スタッフ <span className="text-sm text-zinc-500 font-normal">({staff.length}名)</span></h2>
        <button onClick={() => setEditing({})} className="flex items-center gap-1 px-3 py-2 bg-amber-600 text-white text-sm font-medium rounded-full hover:bg-amber-700 shadow-md"><Icon name="Plus" className="w-4 h-4" />追加</button>
      </div>
      <div className="relative">
        <Icon name="Search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500" />
        <input type="text" placeholder="氏名・役職・号車・コースで検索" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
          className="w-full pl-9 pr-3 py-2 text-sm bg-zinc-800 border border-zinc-700 text-zinc-100 placeholder-zinc-500 rounded-full focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>
      {teams.length > 0 && <TeamFilter teams={teams} selectedTeamId={filterTeamId} setSelectedTeamId={setFilterTeamId} />}
      {filtered.length === 0 ? <EmptyState icon="Users" title={staff.length === 0 ? 'スタッフ未登録' : '該当なし'} description={staff.length === 0 ? '右上の「追加」から新しいスタッフを登録できます。' : '検索条件を変えてみてください。'} /> : (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {filtered.map(s => {
            const st = shiftTypes.find(t => t.id === s.defaultShiftType);
            const fixedOffs = s.fixedDayOff || [];
            const team = s.teamId && teamById[s.teamId];
            return (
              <div key={s.id} className="bg-zinc-800 border border-zinc-700 rounded-xl p-3 hover:border-zinc-600" style={team ? { borderLeftWidth: '3px', borderLeftColor: team.color, borderLeftStyle: 'solid' } : {}}>
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-semibold text-zinc-100">{s.name}</span>
                      {team && <span className="text-[10px] px-1.5 py-0.5 rounded text-white" style={{ background: team.color }}>{team.name}</span>}
                      {s.role && <span className="text-[10px] px-1.5 py-0.5 bg-zinc-700 text-zinc-300 rounded">{s.role}</span>}
                    </div>
                    <div className="mt-1.5 space-y-0.5 text-xs text-zinc-400">
                      {s.vehicle && <div className="flex items-center gap-1"><Icon name="Truck" className="w-3 h-3 text-amber-500" /><span>{s.vehicle}</span></div>}
                      {s.area && <div className="flex items-center gap-1"><Icon name="MapPin" className="w-3 h-3 text-rose-400" /><span>{s.area}</span></div>}
                      {st && <div className="flex items-center gap-1"><Icon name="Clock" className="w-3 h-3" style={{ color: st.color }} /><span>{st.name}</span></div>}
                      {fixedOffs.length > 0 && <div className="flex items-center gap-1"><Icon name="Repeat" className="w-3 h-3 text-zinc-500" /><span>毎週{fixedOffs.map(dow => DOW[dow]).join('・')}休</span></div>}
                    </div>
                  </div>
                  <div className="flex flex-col gap-1">
                    <button onClick={() => setEditing(s)} className="p-1.5 text-zinc-400 hover:bg-zinc-700 rounded"><Icon name="Edit2" className="w-3.5 h-3.5" /></button>
                    <button onClick={() => handleDelete(s)} className="p-1.5 text-red-400 hover:bg-red-900/30 rounded"><Icon name="Trash2" className="w-3.5 h-3.5" /></button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {editing && <StaffEditModal staff={editing} shiftTypes={shiftTypes} areas={areas} roles={roles} teams={teams} onSave={handleSave} onClose={() => setEditing(null)} />}
    </div>
  );
}

function StaffEditModal({ staff, shiftTypes, areas, roles, teams, onSave, onClose }) {
  const dialog = useDialog();
  const [form, setForm] = useState({
    id: staff.id || '', name: staff.name || '', teamId: staff.teamId || '', role: staff.role || '',
    vehicle: staff.vehicle || '', area: staff.area || '', defaultShiftType: staff.defaultShiftType || '',
    fixedDayOff: Array.isArray(staff.fixedDayOff) ? [...staff.fixedDayOff] : [],
  });
  const toggleFixedOff = (dow) => {
    const next = [...form.fixedDayOff];
    const idx = next.indexOf(dow);
    if (idx >= 0) next.splice(idx, 1); else next.push(dow);
    next.sort();
    setForm({ ...form, fixedDayOff: next });
  };
  const handleSubmit = async () => {
    if (!form.name.trim()) { await dialog.alert({ message: '氏名は必須です' }); return; }
    onSave({ ...form, name: form.name.trim(), role: form.role.trim(), vehicle: form.vehicle.trim(), area: form.area.trim() });
  };
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
      <div className="bg-zinc-800 border border-zinc-700 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between p-4 border-b border-zinc-700">
          <h3 className="font-semibold text-zinc-100">{staff.id ? 'スタッフ編集' : 'スタッフ追加'}</h3>
          <button onClick={onClose} className="p-1.5 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-5 h-5 text-zinc-300" /></button>
        </div>
        <div className="p-4 space-y-3 overflow-y-auto">
          <Field label="氏名" required><Input value={form.name} onChange={(v) => setForm({ ...form, name: v })} placeholder="山田太郎" autoFocus /></Field>
          <Field label="所属班">
            <select value={form.teamId} onChange={(e) => setForm({ ...form, teamId: e.target.value })}
              className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 text-zinc-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm">
              <option value="">未所属</option>
              {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            {teams.length === 0 && <p className="text-[10px] text-zinc-500 mt-1">「班」タブから班を追加できます</p>}
          </Field>
          <Field label="役職"><Input value={form.role} onChange={(v) => setForm({ ...form, role: v })} placeholder="ドライバー、班長など" />{roles.length > 0 && <Suggestions items={roles} onSelect={(v) => setForm({ ...form, role: v })} />}</Field>
          <Field label="号車"><Input value={form.vehicle} onChange={(v) => setForm({ ...form, vehicle: v })} placeholder="1号車" /></Field>
          <Field label="デフォルト配達コース"><Input value={form.area} onChange={(v) => setForm({ ...form, area: v })} placeholder="博多区北部 など" />{areas.length > 0 && <Suggestions items={areas} onSelect={(v) => setForm({ ...form, area: v })} />}</Field>
          <Field label="デフォルトシフト区分">
            <select value={form.defaultShiftType} onChange={(e) => setForm({ ...form, defaultShiftType: e.target.value })}
              className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 text-zinc-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm">
              <option value="">選択なし</option>
              {shiftTypes.map(st => <option key={st.id} value={st.id}>{st.name}（{st.time}）</option>)}
            </select>
          </Field>
          <div>
            <label className="text-xs font-semibold text-zinc-300 mb-1 flex items-center gap-1"><Icon name="Repeat" className="w-3 h-3" />固定休み（毎週）</label>
            <p className="text-[10px] text-zinc-500 mb-2">複数選択可。AI生成時に確実に公休配置されます</p>
            <div className="grid grid-cols-7 gap-1">
              {DOW.map((d, dow) => {
                const selected = form.fixedDayOff.includes(dow);
                return (
                  <button key={dow} type="button" onClick={() => toggleFixedOff(dow)}
                    className={`aspect-square rounded-lg text-sm font-medium ${selected ? 'bg-amber-500 text-white shadow-md' : dow === 0 ? 'bg-red-950/30 text-red-300 hover:bg-red-900/40' : dow === 6 ? 'bg-blue-950/30 text-blue-300 hover:bg-blue-900/40' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-700'}`}>
                    {d}
                  </button>
                );
              })}
            </div>
            {form.fixedDayOff.length > 0 && <div className="mt-2 text-[11px] text-zinc-400">毎週<strong className="text-amber-400">{form.fixedDayOff.map(dow => DOW[dow]).join('・')}曜日</strong>を固定休み</div>}
          </div>
        </div>
        <div className="p-4 border-t border-zinc-700 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 border border-zinc-700 text-zinc-300 rounded-lg text-sm font-medium hover:bg-zinc-700">キャンセル</button>
          <button onClick={handleSubmit} className="flex-1 py-2 bg-amber-600 text-white rounded-lg text-sm font-semibold hover:bg-amber-700"><Icon name="Save" className="w-4 h-4 inline mr-1" />保存</button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, required, children }) {
  return <div><label className="block text-xs font-semibold text-zinc-300 mb-1">{label}{required && <span className="text-red-400 ml-1">*</span>}</label>{children}</div>;
}
function Input({ value, onChange, placeholder, autoFocus }) {
  return <input type="text" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} autoFocus={autoFocus}
    className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 text-zinc-100 placeholder-zinc-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm" />;
}
function Suggestions({ items, onSelect }) {
  return <div className="flex flex-wrap gap-1 mt-1">{items.map(v => <button key={v} type="button" onClick={() => onSelect(v)} className="text-[10px] px-2 py-0.5 bg-zinc-700 hover:bg-amber-600 text-zinc-300 hover:text-white rounded">{v}</button>)}</div>;
}

// ========== シフト区分 ==========
function ShiftTypeView({ shiftTypes, setShiftTypes }) {
  const dialog = useDialog();
  const [editing, setEditing] = useState(null);
  const handleSave = async (data) => {
    if (data.id && shiftTypes.find(s => s.id === data.id)) await setShiftTypes(shiftTypes.map(s => s.id === data.id ? data : s));
    else await setShiftTypes([...shiftTypes, { ...data, id: data.id || newId() }]);
    setEditing(null);
  };
  const handleDelete = async (st) => {
    const ok = await dialog.confirm({ title: '区分削除', message: `「${st.name}」を削除します。`, confirmText: '削除する' });
    if (!ok) return;
    await setShiftTypes(shiftTypes.filter(s => s.id !== st.id));
  };
  return (
    <div className="px-3 pt-3 space-y-3">
      <div className="flex items-center justify-between gap-2">
        <h2 className="text-lg font-semibold flex items-center gap-2 text-zinc-100"><Icon name="Clock" className="w-5 h-5" />シフト区分</h2>
        <button onClick={() => setEditing({ color: COLOR_PALETTE[0] })} className="flex items-center gap-1 px-3 py-2 bg-amber-600 text-white text-sm font-medium rounded-full hover:bg-amber-700 shadow-md"><Icon name="Plus" className="w-4 h-4" />追加</button>
      </div>
      <div className="space-y-2">
        {shiftTypes.map(st => (
          <div key={st.id} className="bg-zinc-800 border border-zinc-700 rounded-xl p-3 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <span className="w-4 h-4 rounded" style={{ background: st.color }}></span>
              <div>
                <div className="font-semibold text-sm text-zinc-100">{st.name}</div>
                <div className="text-xs text-zinc-400">{st.time}</div>
              </div>
            </div>
            <div className="flex gap-1">
              <button onClick={() => setEditing(st)} className="p-1.5 text-zinc-400 hover:bg-zinc-700 rounded"><Icon name="Edit2" className="w-3.5 h-3.5" /></button>
              <button onClick={() => handleDelete(st)} className="p-1.5 text-red-400 hover:bg-red-900/30 rounded"><Icon name="Trash2" className="w-3.5 h-3.5" /></button>
            </div>
          </div>
        ))}
      </div>
      {shiftTypes.length === 0 && <EmptyState icon="Clock" title="区分が未登録です" description="早朝便、午前便など、業務に合わせた区分を追加してください。" />}
      {editing && <ShiftTypeEditModal shiftType={editing} onSave={handleSave} onClose={() => setEditing(null)} />}
    </div>
  );
}

function ShiftTypeEditModal({ shiftType, onSave, onClose }) {

  const [form, setForm] = useState({ id: shiftType.id || '', name: shiftType.name || '', time: shiftType.time || '', color: shiftType.color || COLOR_PALETTE[0] });

          <h3 className="font-semibold text-zinc-100">{shiftType.id ? '区分編集' : '区分追加'}</h3>
          <button onClick={onClose} className="p-1.5 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-5 h-5 text-zinc-300" /></button>
        </div>
        <div className="p-4 space-y-3">
          <Field label="区分名" required><Input value={form.name} onChange={(v) => setForm({ ...form, name: v })} placeholder="早朝便など" autoFocus /></Field>

              ))}

// ========== 希望休 ==========
function DayOffView({ currentMonth, days, staff, dayOff, setDayOff, teams }) {
  const [selectedStaffId, setSelectedStaffId] = useState(staff[0]?.id || null);
  const [searchQuery, setSearchQuery] = useState('');
  const [filterTeamId, setFilterTeamId] = useState('all');
  const teamById = useMemo(() => { const m = {}; teams.forEach(t => m[t.id] = t); return m; }, [teams]);
  useEffect(() => { if (!staff.find(s => s.id === selectedStaffId) && staff.length > 0) setSelectedStaffId(staff[0].id); }, [staff, selectedStaffId]);
  const filteredStaff = useMemo(() => {
    let list = staff;
    if (filterTeamId === 'none') list = list.filter(s => !s.teamId || !teamById[s.teamId]);
    else if (filterTeamId !== 'all') list = list.filter(s => s.teamId === filterTeamId);
    if (searchQuery) { const q = searchQuery.toLowerCase(); list = list.filter(s => s.name.toLowerCase().includes(q)); }
    return list;
  }, [staff, searchQuery, filterTeamId, teamById]);
  const selected = staff.find(s => s.id === selectedStaffId);
  const offDates = (dayOff[selectedStaffId] || []);
  const toggleDay = async (date) => {
    if (!selectedStaffId) return;
    const current = dayOff[selectedStaffId] || [];
    const next = current.includes(date) ? current.filter(d => d !== date) : [...current, date];
    await setDayOff({ ...dayOff, [selectedStaffId]: next });
  };
  if (staff.length === 0) return <div className="px-4"><EmptyState icon="Users" title="スタッフが未登録です" description="先にスタッフを登録してください。" /></div>;

  return (
    <div className="px-3 pt-3 space-y-3">
      <h2 className="text-lg font-semibold flex items-center gap-2 text-zinc-100"><Icon name="CalendarOff" className="w-5 h-5" />希望休 <span className="text-sm text-zinc-500 font-normal">{monthLabel(currentMonth)}</span></h2>
      {teams.length > 0 && <TeamFilter teams={teams} selectedTeamId={filterTeamId} setSelectedTeamId={setFilterTeamId} />}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div className="bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden md:col-span-1">
          <div className="p-2 border-b border-zinc-700">
            <div className="relative">
              <Icon name="Search" className="w-3.5 h-3.5 absolute left-2 top-1/2 -translate-y-1/2 text-zinc-500" />
              <input type="text" placeholder="氏名検索" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full pl-7 pr-2 py-1.5 text-xs bg-zinc-900 border border-zinc-700 text-zinc-100 placeholder-zinc-500 rounded-md focus:outline-none focus:ring-1 focus:ring-amber-500" />
            </div>
          </div>
          <div className="max-h-[60vh] overflow-y-auto">
            {filteredStaff.map(s => {
              const count = (dayOff[s.id] || []).filter(d => d.startsWith(currentMonth)).length;
              const active = s.id === selectedStaffId;
              const team = s.teamId && teamById[s.teamId];
              return (
                <button key={s.id} onClick={() => setSelectedStaffId(s.id)}
                  className={`w-full text-left px-3 py-2 border-b border-zinc-700/50 transition-colors ${active ? 'bg-amber-500/15 border-l-4 border-l-amber-500' : 'hover:bg-zinc-700/50'}`}>
                  <div className="flex items-center justify-between">
                    <div className="font-medium text-sm text-zinc-100 flex items-center gap-1.5">{team && <span className="w-1.5 h-1.5 rounded-full" style={{ background: team.color }}></span>}{s.name}</div>
                    {count > 0 && <span className="text-[10px] px-1.5 py-0.5 bg-red-500/20 text-red-400 rounded-full font-semibold">{count}日</span>}
                  </div>
                  {(s.role || s.vehicle || team) && <div className="text-[10px] text-zinc-500 mt-0.5">{[team?.name, s.role, s.vehicle].filter(Boolean).join(' / ')}</div>}
                </button>
              );
            })}
          </div>
        </div>
        <div className="bg-zinc-800 border border-zinc-700 rounded-xl p-3 md:col-span-2">
          {selected ? (
            <Fragment>
              <div className="mb-3 pb-3 border-b border-zinc-700">
                <div className="font-bold text-zinc-100">{selected.name}</div>
                <div className="text-xs text-zinc-400">日付をタップで希望休を切替</div>
                {(selected.fixedDayOff || []).length > 0 && (
                  <div className="text-[10px] text-zinc-500 mt-1 flex items-center gap-1"><Icon name="Repeat" className="w-2.5 h-2.5" />固定休み: 毎週{(selected.fixedDayOff || []).map(dow => DOW[dow]).join('・')}</div>
                )}
              </div>
              <div className="grid grid-cols-7 gap-1 text-center">
                {DOW.map((d, i) => <div key={d} className={`text-[10px] font-semibold py-1 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-zinc-500'}`}>{d}</div>)}
                {Array.from({ length: days[0]?.dow || 0 }).map((_, i) => <div key={`empty-${i}`}></div>)}
                {days.map(d => {
                  const isOff = offDates.includes(d.date);
                  const isFixed = isFixedDayOff(selected, d.dow);
                  return (
                    <button key={d.date} onClick={() => toggleDay(d.date)}
                      className={`aspect-square rounded-lg text-sm font-medium relative ${isOff ? 'bg-red-500 text-white shadow-md scale-95' : isFixed ? 'bg-zinc-700 text-zinc-300 ring-1 ring-zinc-600' : d.dow === 0 ? 'bg-red-950/30 text-red-300 hover:bg-red-900/40' : d.dow === 6 ? 'bg-blue-950/30 text-blue-300 hover:bg-blue-900/40' : 'bg-zinc-700/50 text-zinc-200 hover:bg-zinc-700'}`}>
                      {d.day}{isFixed && !isOff && <Icon name="Repeat" className="absolute top-0.5 right-0.5 w-2 h-2 text-zinc-500" />}
                    </button>
                  );
                })}
              </div>
              {offDates.filter(d => d.startsWith(currentMonth)).length > 0 && (
                <div className="mt-3 pt-3 border-t border-zinc-700">
                  <div className="text-xs font-semibold text-zinc-400 mb-1.5">希望休一覧</div>
                  <div className="flex flex-wrap gap-1">
                    {offDates.filter(d => d.startsWith(currentMonth)).sort().map(d => {
                      const day = parseInt(d.split('-')[2]);
                      return (
                        <span key={d} className="inline-flex items-center gap-1 px-2 py-0.5 text-xs bg-red-500/20 text-red-300 rounded-md">
                          {day}日
                          <button onClick={() => toggleDay(d)} className="hover:bg-red-500/30 rounded-full"><Icon name="X" className="w-3 h-3" /></button>
                        </span>
                      );
                    })}
                  </div>
                </div>
              )}
            </Fragment>
          ) : <div className="text-center text-zinc-500 py-12 text-sm">スタッフを選択してください</div>}
        </div>
      </div>
    </div>
  );
}

function PasscodeChangeModal({ currentPasscode, onSave, onClose }) {
  const [step, setStep] = useState('current');
  const [input, setInput] = useState('');
  const [newCode, setNewCode] = useState('');
  const [error, setError] = useState('');
  const stepTitle = { current: '現在のパスコードを入力', new: '新しいパスコードを入力', confirm: 'もう一度入力して確認' }[step];
  const handleNumber = (n) => {
    if (input.length >= 4) return;
    setError('');
    const next = input + n;
    setInput(next);
    if (next.length === 4) setTimeout(() => {
      if (step === 'current') {
        if (next === currentPasscode) { setInput(''); setStep('new'); }
        else { setError('現在のパスコードが違います'); setInput(''); }
      } else if (step === 'new') { setNewCode(next); setInput(''); setStep('confirm'); }
      else if (step === 'confirm') {
        if (next === newCode) onSave(next);
        else { setError('パスコードが一致しません'); setInput(''); setStep('new'); setNewCode(''); }
      }
    }, 100);
  };
  const handleDelete = () => { setError(''); setInput(input.slice(0, -1)); };
  return (
    <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/70 backdrop-blur-md p-4">
      <div className="bg-zinc-800 border border-zinc-700 rounded-3xl shadow-2xl max-w-xs w-full p-6">
        <div className="flex items-center justify-between mb-1">
          <h3 className="font-semibold text-zinc-100">パスコード変更</h3>
          <button onClick={onClose} className="p-1 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-4 h-4 text-zinc-300" /></button>
        </div>
        <p className="text-xs text-zinc-400 mb-4">{stepTitle}</p>
        <div className="flex justify-center gap-3 mb-6">
          {[0,1,2,3].map(i => <div key={i} className={`w-3 h-3 rounded-full ${error ? 'bg-red-500' : i < input.length ? 'bg-amber-500 scale-110' : 'bg-zinc-700'}`} />)}
        </div>
        {error && <div className="text-center text-xs text-red-400 mb-3">{error}</div>}
        <div className="grid grid-cols-3 gap-2">
          {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleNumber(String(n))} className="aspect-square text-xl font-semibold text-zinc-100 bg-zinc-700 hover:bg-zinc-600 active:bg-amber-600 rounded-xl">{n}</button>)}
          <div></div>
          <button onClick={() => handleNumber('0')} className="aspect-square text-xl font-semibold text-zinc-100 bg-zinc-700 hover:bg-zinc-600 active:bg-amber-600 rounded-xl">0</button>
          <button onClick={handleDelete} disabled={input.length === 0} className="aspect-square text-zinc-300 bg-zinc-700/50 hover:bg-zinc-700 disabled:opacity-30 rounded-xl flex items-center justify-center"><Icon name="X" className="w-5 h-5" /></button>
        </div>
      </div>
    </div>
  );
}

// ========== 祝祭日・休業日管理 ==========
function HolidaysView({ customHolidays, setCustomHolidays }) {
  const dialog = useDialog();
  const [editing, setEditing] = useState(null);
  const [filterYear, setFilterYear] = useState(new Date().getFullYear());

  // 祝日リスト統合（日本祝日 + カスタム）
  const allHolidays = useMemo(() => {
    const merged = {};
    Object.entries(JP_HOLIDAYS).forEach(([date, name]) => {
      if (date.startsWith(String(filterYear))) merged[date] = { name, type: 'jp' };
    });
    Object.entries(customHolidays || {}).forEach(([date, name]) => {
      if (date.startsWith(String(filterYear))) merged[date] = { name, type: 'custom' };
    });
    return Object.entries(merged).sort(([a], [b]) => a.localeCompare(b)).map(([date, info]) => ({ date, ...info }));
  }, [customHolidays, filterYear]);

  const handleSave = async (date, name) => {
    if (!date || !name.trim()) { await dialog.alert({ message: '日付と名称を入力してください' }); return; }
    await setCustomHolidays({ ...customHolidays, [date]: name.trim() });
    setEditing(null);
  };
  const handleDelete = async (date) => {
    const ok = await dialog.confirm({ title: '休業日削除', message: `「${customHolidays[date]}」を削除します。`, confirmText: '削除' });
    if (!ok) return;
    const next = { ...customHolidays };
    delete next[date];
    await setCustomHolidays(next);
  };

  return (
    <div className="px-3 pt-3 space-y-3">
      <div className="flex items-center justify-between gap-2">
        <h2 className="text-lg font-semibold flex items-center gap-2 text-zinc-100">
          <Icon name="CalendarHeart" className="w-5 h-5 text-rose-400" />祝祭日・休業日
        </h2>
        <button onClick={() => setEditing({ date: '', name: '' })}
          className="flex items-center gap-1 px-3 py-2 bg-amber-600 text-white text-sm font-medium rounded-full hover:bg-amber-700 shadow-md">
          <Icon name="Plus" className="w-4 h-4" />会社休業日
        </button>
      </div>

      <section className="bg-zinc-800 border border-zinc-700 rounded-xl p-3">
        <div className="flex items-center gap-2 mb-2 text-xs text-zinc-400">
          <Icon name="HelpCircle" className="w-3.5 h-3.5" />
          <span>祝日（赤）はシステム内蔵で編集不可。会社独自の休業日（青）は追加・編集できます</span>
        </div>
        <div className="flex items-center gap-2">
          <span className="text-xs font-semibold text-zinc-400">年:</span>
          {[2025, 2026, 2027].map(y => (
            <button key={y} onClick={() => setFilterYear(y)}
              className={`px-3 py-1 text-xs font-medium rounded-full ${filterYear === y ? 'bg-amber-600 text-white' : 'bg-zinc-700 text-zinc-300 hover:bg-zinc-600'}`}>
              {y}年
            </button>
          ))}
        </div>
      </section>

      {allHolidays.length === 0 ? (
        <EmptyState icon="CalendarHeart" title="該当データなし" description={`${filterYear}年の祝祭日が見つかりません`} />
      ) : (
        <div className="space-y-1.5">
          {allHolidays.map(h => {
            const d = parseYmd(h.date);
            const dow = d.getDay();
            return (
              <div key={h.date} className={`flex items-center gap-3 px-3 py-2.5 rounded-lg border ${h.type === 'jp' ? 'bg-red-950/15 border-red-900/40' : 'bg-blue-950/15 border-blue-900/40'}`}>
                <div className={`flex-shrink-0 text-center min-w-[60px] ${dow === 0 ? 'text-red-400' : dow === 6 ? 'text-blue-400' : 'text-zinc-300'}`}>
                  <div className="text-[10px] font-semibold opacity-70">{d.getFullYear()}/{d.getMonth()+1}</div>
                  <div className="text-xl font-bold leading-none">{d.getDate()}</div>
                  <div className="text-[10px] opacity-70">{DOW[dow]}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${h.type === 'jp' ? 'bg-red-500/20 text-red-300' : 'bg-blue-500/20 text-blue-300'}`}>
                      {h.type === 'jp' ? '祝日' : '会社休業'}
                    </span>
                    <span className="font-semibold text-sm text-zinc-100 truncate">{h.name}</span>
                  </div>
                </div>
                {h.type === 'custom' && (
                  <div className="flex gap-1 flex-shrink-0">
                    <button onClick={() => setEditing({ date: h.date, name: h.name })} className="p-1.5 text-zinc-400 hover:bg-zinc-700 rounded">
                      <Icon name="Edit2" className="w-3.5 h-3.5" />

                    <button onClick={() => handleDelete(h.date)} className="p-1.5 text-red-400 hover:bg-red-900/30 rounded">
                      <Icon name="Trash2" className="w-3.5 h-3.5" />
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {editing && <HolidayEditModal initial={editing} onSave={handleSave} onClose={() => setEditing(null)} />}
    </div>
  );
}

function AnnouncementsView({ announcements, setAnnouncements }) {
  const dialog = useDialog();
  const { isAdmin } = useAuth();

  const sorted = useMemo(() => [...announcements].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)), [announcements]);

  const handleSave = async (data) => {
    if (data.id) {
      await setAnnouncements(announcements.map(a => a.id === data.id ? { ...data, updatedAt: Date.now() } : a));
    } else {
      const newItem = { ...data, id: newId(), createdAt: Date.now(), updatedAt: Date.now() };
      await setAnnouncements([newItem, ...announcements]);
    }
    setEditing(null);
  };
  const handleDelete = async (a) => {
    const ok = await dialog.confirm({ title: 'お知らせ削除', message: `「${a.title}」を削除します。`, confirmText: '削除' });
    if (!ok) return;
    await setAnnouncements(announcements.filter(x => x.id !== a.id));
  };

  const formatDate = (ts) => {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;

        <div className="space-y-2">
          {sorted.map(a => (
            <article key={a.id} className={`rounded-xl p-4 border ${a.pinned ? 'bg-amber-500/10 border-amber-500/40' : 'bg-zinc-800 border-zinc-700'}`}>
              <div className="flex items-start justify-between gap-2 mb-2">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    {a.pinned && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-amber-500 text-amber-950 text-[10px] font-bold rounded"><Icon name="Pin" className="w-2.5 h-2.5" />重要</span>}
                    <h3 className="font-bold text-base text-zinc-100">{a.title}</h3>
                  </div>
                  <div className="text-[11px] text-zinc-500">投稿: {formatDate(a.createdAt)}{a.updatedAt && a.updatedAt !== a.createdAt && ` ・更新: ${formatDate(a.updatedAt)}`}</div>
                </div>
                {isAdmin && (
                  <div className="flex gap-1 flex-shrink-0">
                    <button onClick={() => setEditing(a)} className="p-1.5 text-zinc-400 hover:bg-zinc-700 rounded">
                      <Icon name="Edit2" className="w-3.5 h-3.5" />
                    </button>
                    <button onClick={() => handleDelete(a)} className="p-1.5 text-red-400 hover:bg-red-900/30 rounded">
                      <Icon name="Trash2" className="w-3.5 h-3.5" />
                    </button>
                  </div>
                )}
              </div>
              <div className="text-sm text-zinc-200 whitespace-pre-wrap break-words leading-relaxed">{a.body}</div>
            </article>
          ))}
        </div>
      )}

      {editing && isAdmin && (
        <AnnouncementEditModal initial={editing} onSave={handleSave} onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

function AnnouncementEditModal({ initial, onSave, onClose }) {
  const dialog = useDialog();
  const [form, setForm] = useState({
    id: initial.id || '',
    title: initial.title || '',
    body: initial.body || '',
    pinned: !!initial.pinned,
    createdAt: initial.createdAt,
  });
  const handleSubmit = async () => {
    if (!form.title.trim()) { await dialog.alert({ message: 'タイトルを入力してください' }); return; }
    if (!form.body.trim()) { await dialog.alert({ message: '本文を入力してください' }); return; }
    onSave({ ...form, title: form.title.trim(), body: form.body.trim() });
  };
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
      <div className="bg-zinc-800 border border-zinc-700 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between p-4 border-b border-zinc-700">
          <h3 className="font-semibold text-zinc-100 flex items-center gap-2">
            <Icon name="Send" className="w-4 h-4 text-amber-400" />
            {initial.id ? 'お知らせ編集' : '新しいお知らせ'}
          </h3>
          <button onClick={onClose} className="p-1.5 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-5 h-5 text-zinc-300" /></button>
        </div>
        <div className="p-4 space-y-3 overflow-y-auto">
          <Field label="タイトル" required>
            <Input value={form.title} onChange={(v) => setForm({ ...form, title: v })} placeholder="例: 今週の連絡事項" autoFocus />
          </Field>
          <Field label="本文" required>
            <textarea value={form.body} onChange={(e) => setForm({ ...form, body: e.target.value })}
              placeholder="お知らせの内容を書いてください。改行も使えます。"
              rows={8}
              className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 text-zinc-100 placeholder-zinc-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm resize-y" />
          </Field>
          <label className="flex items-center gap-2 cursor-pointer p-2 hover:bg-zinc-700/50 rounded-lg">
            <input type="checkbox" checked={form.pinned} onChange={(e) => setForm({ ...form, pinned: e.target.checked })}
              className="w-4 h-4 rounded border-zinc-600 bg-zinc-900" />
            <Icon name="Pin" className="w-4 h-4 text-amber-400" />
            <span className="text-sm text-zinc-200">重要マークを付ける（一覧の上部に強調表示）</span>
          </label>
        </div>
        <div className="p-4 border-t border-zinc-700 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 border border-zinc-700 text-zinc-300 rounded-lg text-sm font-medium hover:bg-zinc-700">キャンセル</button>
          <button onClick={handleSubmit} className="flex-1 py-2 bg-amber-600 text-white rounded-lg text-sm font-semibold hover:bg-amber-700">
            <Icon name="Send" className="w-4 h-4 inline mr-1" />{initial.id ? '更新' : '投稿'}
          </button>
        </div>
      </div>
    </div>
  );
}

function EmptyState({ icon, title, description }) {
  return (
    <div className="text-center py-16 px-4">
      <div className="inline-flex w-14 h-14 items-center justify-center bg-zinc-800 rounded-2xl mb-3"><Icon name={icon} className="w-7 h-7 text-zinc-500" /></div>
      <h3 className="font-semibold text-zinc-200">{title}</h3>
      <p className="text-sm text-zinc-500 mt-1 max-w-sm mx-auto">{description}</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
