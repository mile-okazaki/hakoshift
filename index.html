const pad = (n) => String(n).padStart(2, '0');
const ym = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
const ymd = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const newId = () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
const parseYmd = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };

const getDaysInMonth = (yearMonth) => {
  const [y, m] = yearMonth.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  return Array.from({ length: last }, (_, i) => {
    const d = new Date(y, m - 1, i + 1);
    return { date: ymd(d), day: i + 1, dow: d.getDay() };
  });
};

const monthLabel = (yearMonth) => {
  const [y, m] = yearMonth.split('-').map(Number);
  return `${y}年${m}月`;
};

const shiftMonth = (yearMonth, delta) => {
  const [y, m] = yearMonth.split('-').map(Number);
  return ym(new Date(y, m - 1 + delta, 1));
};

// 週の月曜日を取得（月曜始まり）
const getMondayOf = (date) => {
  const d = new Date(date);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow; // 日曜は-6、月曜は0、火曜は-1
  d.setDate(d.getDate() + diff);
  return d;
};

const getWeekDays = (mondayDate) => {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(mondayDate);
    d.setDate(d.getDate() + i);
    return { date: ymd(d), day: d.getDate(), dow: d.getDay(), month: d.getMonth() + 1 };
  });
};

const weekLabel = (mondayDate) => {
  const sunday = new Date(mondayDate);
  sunday.setDate(sunday.getDate() + 6);
  const sm = mondayDate.getMonth() + 1;
  const em = sunday.getMonth() + 1;
  if (sm === em) {
    return `${mondayDate.getFullYear()}年${sm}月${mondayDate.getDate()}日〜${sunday.getDate()}日`;
  }
  return `${mondayDate.getFullYear()}年${sm}/${mondayDate.getDate()}〜${em}/${sunday.getDate()}`;
};

const dayLabel = (date) => {
  const d = parseYmd(date);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
};

const shiftDate = (dateStr, deltaDays) => {
  const d = parseYmd(dateStr);
  d.setDate(d.getDate() + deltaDays);
  return ymd(d);
};

const normalizeShift = (v) => {
  if (!v) return null;
  if (v === 'off') return 'off';
  if (v === 'reqoff') return 'reqoff';
  if (Array.isArray(v)) {
    return v.map(slot => {
      if (!slot) return null;
      if (typeof slot === 'string') return { shiftTypeId: slot, area: '' };
      return { shiftTypeId: slot.shiftTypeId, area: slot.area || '' };
    });
  }
  if (typeof v === 'string') return [{ shiftTypeId: v, area: '' }, null];
  return null;
};

// localStorage
const useStorage = (key, defaultValue) => {
  const fullKey = `${PREFIX}:${key}`;
  const [value, setValue] = useState(() => {
    try {
      const raw = localStorage.getItem(fullKey);
      return raw ? JSON.parse(raw) : defaultValue;
    } catch (e) { return defaultValue; }
  });
  useEffect(() => {
    try {
      const raw = localStorage.getItem(fullKey);
      if (raw) setValue(JSON.parse(raw));
      else setValue(defaultValue);
    } catch (e) {}
  }, [fullKey]);
  const save = useCallback(async (next) => {
    setValue(prev => {
      const resolved = typeof next === 'function' ? next(prev) : next;
      try { localStorage.setItem(fullKey, JSON.stringify(resolved)); } catch (e) {}
      return resolved;
    });
  }, [fullKey]);
  return [value, save];
};

const AuthContext = createContext(null);
const useAuth = () => useContext(AuthContext);
const DialogContext = createContext(null);
const useDialog = () => useContext(DialogContext);

function DialogProvider({ children }) {
  const [dialog, setDialog] = useState(null);
  const confirm = useCallback((opts) => new Promise((resolve) => {
    setDialog({ type: 'confirm', title: opts.title || '確認', message: opts.message,
      confirmText: opts.confirmText || '削除', cancelText: opts.cancelText || 'キャンセル',
      danger: opts.danger !== false,
      onResult: (res) => { setDialog(null); resolve(res); } });
  }), []);
  const alert = useCallback((opts) => new Promise((resolve) => {
    setDialog({ type: 'alert', title: opts.title || 'お知らせ', message: opts.message,
      confirmText: 'OK', onResult: () => { setDialog(null); resolve(); } });
  }), []);
  return (
    <DialogContext.Provider value={{ confirm, alert }}>
      {children}
      {dialog && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
          <div className="bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden">
            <div className="p-5">
              <div className="flex items-start gap-3">
                {dialog.danger && dialog.type === 'confirm' && (
                  <div className="flex-shrink-0 w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center">
                    <Icon name="AlertTriangle" className="w-5 h-5 text-red-400" />
                  </div>
                )}
                <div className="flex-1">
                  <h3 className="font-semibold text-zinc-100 text-base">{dialog.title}</h3>
                  <p className="text-sm text-zinc-400 mt-1 whitespace-pre-line">{dialog.message}</p>
                </div>
              </div>
            </div>
            <div className="px-5 pb-5 flex gap-2 justify-end">
              {dialog.type === 'confirm' && (
                <button onClick={() => dialog.onResult(false)} className="px-4 py-2 text-sm font-medium text-zinc-300 hover:bg-zinc-700 rounded-lg">
                  {dialog.cancelText}
                </button>
              )}
              <button onClick={() => dialog.onResult(true)}
                className={`px-4 py-2 text-sm font-semibold text-white rounded-lg ${dialog.danger && dialog.type === 'confirm' ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                {dialog.confirmText}
              </button>
            </div>
          </div>
        </div>
      )}
    </DialogContext.Provider>
  );
}

// ========== アラート計算 ==========
const calcConsecutiveAlerts = (staff, days, shifts, dayOff, limit) => {
  const result = {};
  staff.forEach(s => {
    const alertSet = new Set();
    let streak = 0;
    days.forEach(d => {
      const v = normalizeShift(shifts[`${d.date}:${s.id}`]);
      const isReq = (dayOff[s.id] || []).includes(d.date);
      const isOff = v === 'off' || v === 'reqoff' || isReq;
      const isWork = !isOff && isWorkingCell(v);
      if (isWork) { streak++; if (streak >= limit) alertSet.add(d.date); }
      else streak = 0;
    });
    result[s.id] = alertSet;
  });
  return result;
};

const calcVehicleOverlapAlerts = (staff, days, shifts) => {
  const overlapMap = {};
  days.forEach(d => {
    const groups = {};
    staff.forEach(s => {
      if (!s.vehicle) return;
      const v = normalizeShift(shifts[`${d.date}:${s.id}`]);
      if (!v || v === 'off' || v === 'reqoff' || !Array.isArray(v)) return;
      v.forEach(slot => {
        if (!slot || !slot.shiftTypeId) return;
        const key = `${s.vehicle}|${slot.shiftTypeId}`;
        (groups[key] = groups[key] || []).push(s.id);
      });
    });
    Object.entries(groups).forEach(([key, sids]) => {
      if (sids.length > 1) sids.forEach(sid => {
        const k = `${d.date}:${sid}`;
        (overlapMap[k] = overlapMap[k] || new Set()).add(key);
      });
    });
  });
  return overlapMap;
};

const calcAreaOverlapAlerts = (staff, days, shifts) => {
  const overlapMap = {};
  days.forEach(d => {
    const groups = {};
    staff.forEach(s => {
      const v = normalizeShift(shifts[`${d.date}:${s.id}`]);
      if (!v || v === 'off' || v === 'reqoff' || !Array.isArray(v)) return;
      v.forEach(slot => {
        if (!slot || !slot.shiftTypeId) return;
        const area = slot.area || s.area || '';
        if (!area) return;
        const key = `${area}|${slot.shiftTypeId}`;
        (groups[key] = groups[key] || []).push(s.id);
      });
    });
    Object.entries(groups).forEach(([key, sids]) => {
      if (sids.length > 1) sids.forEach(sid => {
        const k = `${d.date}:${sid}`;
        (overlapMap[k] = overlapMap[k] || new Set()).add(key);
      });
    });
  });
  return overlapMap;
};

// ========== AI生成 ==========
const generateShifts = (staff, days, dayOff, shiftTypes, aiSettings) => {
  const limit = aiSettings.warnConsecutiveDays || CONSECUTIVE_WORK_LIMIT;
  const result = {};
  staff.forEach(s => (dayOff[s.id] || []).forEach(date => { result[`${date}:${s.id}`] = 'reqoff'; }));
  const streak = {};
  staff.forEach(s => { streak[s.id] = 0; });

  days.forEach(d => {
    const usedV = {}, usedA = {};
    staff.forEach(s => {
      const key = `${d.date}:${s.id}`;
      if (result[key] === 'reqoff') { streak[s.id] = 0; return; }
      if (isFixedDayOff(s, d.dow)) { result[key] = 'off'; streak[s.id] = 0; return; }
      if (streak[s.id] >= limit - 1) { result[key] = 'off'; streak[s.id] = 0; return; }

      const pattern = aiSettings.weeklyPatterns?.[s.id];
      let candidates = [];
      if (pattern && pattern[d.dow] !== undefined) {
        if (pattern[d.dow] === null) { result[key] = 'off'; streak[s.id] = 0; return; }
        candidates = [pattern[d.dow]];
        shiftTypes.forEach(st => { if (st.id !== pattern[d.dow]) candidates.push(st.id); });
      } else if (s.defaultShiftType) {
        candidates = [s.defaultShiftType];
        shiftTypes.forEach(st => { if (st.id !== s.defaultShiftType) candidates.push(st.id); });
      } else { streak[s.id] = 0; return; }

      let assigned = null;
      for (const stId of candidates) {
        const vK = s.vehicle ? `${s.vehicle}|${stId}` : null;
        const aK = s.area ? `${s.area}|${stId}` : null;
        if (!(vK && usedV[vK]) && !(aK && usedA[aK])) {
          assigned = stId;
          if (vK) usedV[vK] = s.id;
          if (aK) usedA[aK] = s.id;
          break;
        }
      }
      if (assigned) {
        result[key] = [{ shiftTypeId: assigned, area: s.area || '' }, null];
        streak[s.id] += 1;
      } else { result[key] = 'off'; streak[s.id] = 0; }
    });
  });
  return result;
};

// ========== メインApp ==========
function App() {
  return <DialogProvider><HakoShift /></DialogProvider>;
}

function HakoShift() {
  const [activeTab, setActiveTab] = useState('shifts');
  const [viewMode, setViewMode] = useStorage('viewMode', 'month'); // 'day' | 'week' | 'month'
  const [currentMonth, setCurrentMonth] = useState(ym(new Date()));
  const [currentDate, setCurrentDate] = useState(ymd(new Date()));
  const [currentWeekStart, setCurrentWeekStart] = useState(ymd(getMondayOf(new Date())));
  const [menuOpen, setMenuOpen] = useState(false);
  const [role, setRole] = useState(null);
  const [showLogin, setShowLogin] = useState(false);

  const [staff, setStaff] = useStorage('staff', []);
  const [shiftTypes, setShiftTypes] = useStorage('shiftTypes', DEFAULT_SHIFT_TYPES);
  const [dayOff, setDayOff] = useStorage('dayOff', {});
  const [areas, setAreas] = useStorage('areas', []);
  const [roles, setRoles] = useStorage('roles', []);
  const [shifts, setShifts] = useStorage(`shifts:${currentMonth}`, {});
  const [aiSettings, setAiSettings] = useStorage('aiSettings', DEFAULT_AI_SETTINGS);
  const [teams, setTeams] = useStorage('teams', []);
  const [authConfig, setAuthConfig] = useStorage('authConfig', DEFAULT_AUTH_CONFIG);
  const [customHolidays, setCustomHolidays] = useStorage('customHolidays', {});
  const [announcements, setAnnouncements] = useStorage('announcements', []);

  // 表示中の月から日付配列を生成（月モード用）
  const days = useMemo(() => getDaysInMonth(currentMonth), [currentMonth]);

  // 週/日モードで使う日付計算 - 表示している日/週の月のシフトを別途読み込む必要がある
  // currentDate / currentWeekStart の月が currentMonth と異なる場合に対応
  const visibleMonth = useMemo(() => {
    if (viewMode === 'day') return ym(parseYmd(currentDate));
    if (viewMode === 'week') {
      const m = parseYmd(currentWeekStart);
      const sun = new Date(m); sun.setDate(sun.getDate() + 6);
      // 週の中で月をまたぐ場合は両方読む必要があるが、簡略化して開始日の月を使用
      return ym(m);
    }
    return currentMonth;
  }, [viewMode, currentDate, currentWeekStart, currentMonth]);

  // viewMode変更時、currentMonth を visibleMonth に同期
  useEffect(() => {
    if (visibleMonth !== currentMonth) setCurrentMonth(visibleMonth);
  }, [visibleMonth]);

  // 週が月をまたぐ場合の追加月読み込み（useStorage二重呼び出し回避）
  const extraMonthKey = useMemo(() => {
    if (viewMode !== 'week') return null;
    const m = parseYmd(currentWeekStart);
    const sun = new Date(m); sun.setDate(sun.getDate() + 6);
    const otherMonth = ym(sun) !== ym(m) ? ym(sun) : null;
    if (otherMonth && otherMonth !== currentMonth) return otherMonth;
    return null;
  }, [viewMode, currentWeekStart, currentMonth]);

  const [extraShifts, setExtraShiftsRaw] = useState({});
  useEffect(() => {
    if (!extraMonthKey) { setExtraShiftsRaw({}); return; }
    try {
      const raw = localStorage.getItem(`${PREFIX}:shifts:${extraMonthKey}`);
      setExtraShiftsRaw(raw ? JSON.parse(raw) : {});
    } catch (e) { setExtraShiftsRaw({}); }
  }, [extraMonthKey]);
  const setExtraShifts = useCallback(async (next) => {
    if (!extraMonthKey) return;
    setExtraShiftsRaw(prev => {
      const resolved = typeof next === 'function' ? next(prev) : next;
      try { localStorage.setItem(`${PREFIX}:shifts:${extraMonthKey}`, JSON.stringify(resolved)); } catch (e) {}
      return resolved;
    });
  }, [extraMonthKey]);

  const mergedShifts = useMemo(() => {
    if (extraMonthKey) return { ...shifts, ...extraShifts };
    return shifts;
  }, [shifts, extraShifts, extraMonthKey]);

  // 統合シフト書き込み: どの月に属するかでルーティング
  const setShiftsRouted = useCallback(async (updater) => {
    const prevAll = mergedShifts;
    const next = typeof updater === 'function' ? updater(prevAll) : updater;
    // 月別に分ける
    const byMonth = {};
    Object.entries(next).forEach(([key, val]) => {
      const date = key.split(':')[0];
      const m = date.substring(0, 7);
      (byMonth[m] = byMonth[m] || {})[key] = val;
    });
    // currentMonth に対する更新
    const cmData = byMonth[currentMonth] || {};
    await setShifts(cmData);
    // 週モードで月またぎの場合
    if (viewMode === 'week') {
      const m = parseYmd(currentWeekStart);
      const sun = new Date(m); sun.setDate(sun.getDate() + 6);
      const otherMonth = ym(sun) !== ym(m) ? ym(sun) : null;
      if (otherMonth && otherMonth !== currentMonth) {
        await setExtraShifts(byMonth[otherMonth] || {});
      }
    }
  }, [mergedShifts, currentMonth, viewMode, currentWeekStart, setShifts, setExtraShifts]);

  const isAdmin = role === 'admin';
  const isViewer = role === 'viewer';

  useEffect(() => { if (isViewer && activeTab !== 'shifts') setActiveTab('shifts'); }, [isViewer, activeTab]);

  const handleLogin = (passcode) => {
    if (passcode === authConfig.passcode) { setRole('admin'); setShowLogin(false); return true; }
    return false;
  };
  const handleViewerStart = () => setRole('viewer');
  const handleLogout = () => { setRole(null); setMenuOpen(false); };

  const authValue = useMemo(() => ({ role, isAdmin, isViewer, authConfig, setAuthConfig }),
    [role, isAdmin, isViewer, authConfig, setAuthConfig]);

  if (!role) {
    return <LockScreen onAdminLogin={() => setShowLogin(true)} onViewerStart={handleViewerStart}
      showLogin={showLogin} onLoginSubmit={handleLogin} onLoginClose={() => setShowLogin(false)} />;
  }

  return (
    <AuthContext.Provider value={authValue}>
      <div className="min-h-screen bg-zinc-900 text-zinc-100">
        <Header viewMode={viewMode} setViewMode={setViewMode}
          currentMonth={currentMonth} onMonthChange={setCurrentMonth}
          currentDate={currentDate} setCurrentDate={setCurrentDate}
          currentWeekStart={currentWeekStart} setCurrentWeekStart={setCurrentWeekStart}
          onMenuClick={() => setMenuOpen(true)} activeTab={activeTab}
          onLogout={handleLogout} onAdminLogin={() => setShowLogin(true)} />
        {showLogin && <LoginModal onSubmit={handleLogin} onClose={() => setShowLogin(false)} />}
        {menuOpen && <SideMenu activeTab={activeTab}
          onChange={(t) => { setActiveTab(t); setMenuOpen(false); }}
          onClose={() => setMenuOpen(false)} shiftTypes={shiftTypes} onLogout={handleLogout} />}
        <main className="max-w-7xl mx-auto pb-20">
          {activeTab === 'shifts' && (
            <ShiftView viewMode={viewMode} setViewMode={setViewMode}
              currentMonth={currentMonth} days={days} currentDate={currentDate}
              currentWeekStart={currentWeekStart} setCurrentDate={setCurrentDate}
              setCurrentWeekStart={setCurrentWeekStart}
              staff={staff} shiftTypes={shiftTypes} dayOff={dayOff}
              shifts={mergedShifts} setShifts={setShiftsRouted}
              areas={areas} setAreas={setAreas}
              aiSettings={aiSettings} teams={teams} />
          )}
          {activeTab === 'announcements' && (
            <AnnouncementsView announcements={announcements} setAnnouncements={setAnnouncements} />
          )}
          {isAdmin && activeTab === 'staff' && (
            <StaffView staff={staff} setStaff={setStaff} shiftTypes={shiftTypes}
              areas={areas} setAreas={setAreas} roles={roles} setRoles={setRoles} teams={teams} />
          )}
          {isAdmin && activeTab === 'shiftTypes' && (
            <ShiftTypeView shiftTypes={shiftTypes} setShiftTypes={setShiftTypes} />
          )}
          {isAdmin && activeTab === 'teams' && (
            <TeamsView teams={teams} setTeams={setTeams} staff={staff} setStaff={setStaff} />
          )}
          {isAdmin && activeTab === 'dayOff' && (
            <DayOffView currentMonth={currentMonth} days={days} staff={staff}
              dayOff={dayOff} setDayOff={setDayOff} teams={teams} />
          )}
          {isAdmin && activeTab === 'aiSettings' && (
            <AiSettingsView aiSettings={aiSettings} setAiSettings={setAiSettings}
              staff={staff} shiftTypes={shiftTypes} teams={teams} />
          )}
          {isAdmin && activeTab === 'holidays' && (
            <HolidaysView customHolidays={customHolidays} setCustomHolidays={setCustomHolidays} />
          )}
          {isAdmin && activeTab === 'security' && <SecurityView />}
        </main>
      </div>
    </AuthContext.Provider>
  );
}

function LoginModal({ onSubmit, onClose }) {
  const [passcode, setPasscode] = useState('');
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);
  const handleNumber = (n) => {
    if (passcode.length >= 4) return;
    setError(false);
    const next = passcode + n;
    setPasscode(next);
    if (next.length === 4) setTimeout(() => {
      const ok = onSubmit(next);
      if (!ok) { setError(true); setShake(true); setTimeout(() => { setPasscode(''); setShake(false); }, 400); }
    }, 100);
  };
  const handleDelete = () => { setError(false); setPasscode(passcode.slice(0, -1)); };
  return (
    <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/70 backdrop-blur-md p-4">
      <div className={`bg-zinc-800 border border-zinc-700 rounded-3xl shadow-2xl max-w-xs w-full p-6 ${shake ? 'animate-shake' : ''}`}>
        <div className="flex items-center justify-between mb-1">
          <div className="flex items-center gap-2"><Icon name="Lock" className="w-4 h-4 text-amber-400" /><h3 className="font-semibold text-zinc-100">管理者ログイン</h3></div>
          <button onClick={onClose} className="p-1 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-4 h-4 text-zinc-300" /></button>
        </div>
        <p className="text-xs text-zinc-400 mb-4">4桁のパスコードを入力</p>
        <div className="flex justify-center gap-3 mb-6">
          {[0,1,2,3].map(i => <div key={i} className={`w-3 h-3 rounded-full transition-all ${error ? 'bg-red-500' : i < passcode.length ? 'bg-amber-500 scale-110' : 'bg-zinc-700'}`} />)}
        </div>
        {error && <div className="text-center text-xs text-red-400 mb-3">パスコードが違います</div>}
        <div className="grid grid-cols-3 gap-2">
          {[1,2,3,4,5,6,7,8,9].map(n => (
            <button key={n} onClick={() => handleNumber(String(n))} className="aspect-square text-xl font-semibold text-zinc-100 bg-zinc-700 hover:bg-zinc-600 active:bg-amber-600 rounded-xl transition-colors">{n}</button>
          ))}
          <div></div>
          <button onClick={() => handleNumber('0')} className="aspect-square text-xl font-semibold text-zinc-100 bg-zinc-700 hover:bg-zinc-600 active:bg-amber-600 rounded-xl transition-colors">0</button>
          <button onClick={handleDelete} disabled={passcode.length === 0} className="aspect-square text-zinc-300 bg-zinc-700/50 hover:bg-zinc-700 disabled:opacity-30 rounded-xl transition-colors flex items-center justify-center">
            <Icon name="X" className="w-5 h-5" />
          </button>
        </div>
      </div>
    </div>
  );
}

function SideMenu({ activeTab, onChange, onClose, shiftTypes, onLogout }) {
  const { isAdmin } = useAuth();
  const allItems = [
    { id: 'shifts', label: 'シフト表', icon: 'Calendar', adminOnly: false },
    { id: 'announcements', label: 'お知らせ', icon: 'Bell', adminOnly: false },
    { id: 'staff', label: 'スタッフ', icon: 'Users', adminOnly: true },
    { id: 'teams', label: '班', icon: 'UsersRound', adminOnly: true },
    { id: 'shiftTypes', label: 'シフト区分', icon: 'Clock', adminOnly: true },
    { id: 'aiSettings', label: 'AI設定', icon: 'Sparkles', adminOnly: true },
    { id: 'dayOff', label: '希望休', icon: 'CalendarOff', adminOnly: true },
    { id: 'holidays', label: '祝祭日・休業日', icon: 'CalendarHeart', adminOnly: true },
    { id: 'security', label: 'セキュリティ', icon: 'KeyRound', adminOnly: true },

  return (
    <div className="fixed inset-0 z-40 flex">
      <div className="absolute inset-0 bg-black/50" onClick={onClose} />
      <aside className="relative w-72 bg-zinc-800 h-full overflow-y-auto shadow-2xl animate-slide-in flex flex-col">
        <div className="p-5 border-b border-zinc-700">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center"><Icon name="Truck" className="w-5 h-5 text-white" /></div>
            <div className="flex-1">
              <div className="font-bold text-lg text-zinc-100">ハコシフ</div>
              <div className="text-xs text-zinc-400">配達シフト管理</div>
            </div>
          </div>
          <div className="mt-3">
            {isAdmin ? (
              <span className="inline-flex items-center gap-1 px-2 py-1 bg-amber-500/20 text-amber-300 text-xs font-semibold rounded-full"><Icon name="Shield" className="w-3 h-3" />管理者</span>
            ) : (
              <span className="inline-flex items-center gap-1 px-2 py-1 bg-zinc-700 text-zinc-300 text-xs font-semibold rounded-full"><Icon name="Eye" className="w-3 h-3" />閲覧モード</span>
            )}
          </div>
        </div>
        <nav className="py-2 flex-1">
          {items.map(item => {
            const active = activeTab === item.id;
            return (
              <button key={item.id} onClick={() => onChange(item.id)}

                  active ? 'bg-amber-500/15 text-amber-400 border-r-4 border-amber-500' : 'text-zinc-300 hover:bg-zinc-700'
                }`}>
                <Icon name={item.icon} className="w-5 h-5" />

        <div className="px-5 py-3 border-t border-zinc-700">
          <div className="text-xs font-semibold text-zinc-500 mb-2">凡例</div>
          <div className="space-y-1.5 mb-3">
            {shiftTypes.slice(0, 4).map(st => (
              <div key={st.id} className="flex items-center gap-2 text-xs text-zinc-300">
                <span className="w-3 h-3 rounded-sm" style={{ background: st.color }}></span><span>{st.name}</span>
              </div>
            ))}
            <div className="flex items-center gap-2 text-xs text-red-400"><span className="w-3 h-3 rounded-sm bg-red-500"></span><span>希望休</span></div>
            <div className="flex items-center gap-2 text-xs text-zinc-400"><span className="w-3 h-3 rounded-sm bg-zinc-600 border border-zinc-500"></span><span>公休</span></div>
          </div>
          <button onClick={onLogout} className="w-full flex items-center gap-2 px-3 py-2 text-zinc-400 hover:text-red-300 hover:bg-red-900/20 rounded-lg text-sm font-medium transition-colors">
            <Icon name="LogOut" className="w-4 h-4" />ログアウト

      </aside>

  );
}

// ========== シフトビュー（モード切替） ==========
function ShiftView(props) {
  const { viewMode } = props;
  if (viewMode === 'day') return <ShiftDayView {...props} />;
  if (viewMode === 'week') return <ShiftWeekView {...props} />;
  return <ShiftMonthView {...props} />;
}

// ========== 共通: ツールバー ==========

  return (
    <div className="flex flex-wrap items-center gap-2 px-3 pt-3">
      {isAdmin && !hideMonthlyOps && (
        <Fragment>
          <button onClick={onAutoGen} disabled={generating}
            className="flex items-center gap-1.5 px-3 py-2 bg-gradient-to-br from-amber-500 to-orange-600 text-white text-sm font-medium rounded-full shadow-md disabled:opacity-60">
            <Icon name={generating ? 'Loader2' : 'Sparkles'} className={`w-4 h-4 ${generating ? 'animate-spin' : ''}`} />
            {generating ? '生成中' : 'AI自動生成'}
          </button>
          <button onClick={onClearMonth}
            className="flex items-center gap-1.5 px-3 py-2 bg-zinc-800 border border-zinc-700 text-zinc-400 text-sm font-medium rounded-full hover:bg-red-900/30 hover:text-red-300">
            <Icon name="Trash2" className="w-4 h-4" />月次クリア

        </Fragment>
      )}
      <button onClick={onExportCSV} className="flex items-center gap-1.5 px-3 py-2 bg-zinc-800 border border-zinc-700 text-zinc-200 text-sm font-medium rounded-full hover:bg-zinc-700">
        <Icon name="Download" className="w-4 h-4" />CSV
      </button>
      <div className="flex-1 min-w-[140px] relative">
        <Icon name="Search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500" />
        <input type="text" placeholder="検索" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
          className="w-full pl-9 pr-3 py-2 text-sm bg-zinc-800 border border-zinc-700 text-zinc-100 placeholder-zinc-500 rounded-full focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>

  );
}

// ========== 共通: 班フィルター ==========
function TeamFilter({ teams, selectedTeamId, setSelectedTeamId }) {
  if (teams.length === 0) return null;
  return (
    <div className="px-3 flex items-center gap-2 overflow-x-auto pb-1">
      <Icon name="Filter" className="w-3.5 h-3.5 text-zinc-500 flex-shrink-0" />
      <button onClick={() => setSelectedTeamId('all')}
        className={`flex-shrink-0 px-3 py-1 text-xs font-medium rounded-full ${selectedTeamId === 'all' ? 'bg-amber-600 text-white' : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'}`}>全員</button>
      {teams.map(t => (
        <button key={t.id} onClick={() => setSelectedTeamId(t.id)}
          className={`flex-shrink-0 flex items-center gap-1.5 px-3 py-1 text-xs font-medium rounded-full ${selectedTeamId === t.id ? 'text-white' : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'}`}
          style={selectedTeamId === t.id ? { background: t.color } : {}}>
          <span className="w-2 h-2 rounded-full" style={{ background: t.color }}></span>{t.name}
        </button>
      ))}
      <button onClick={() => setSelectedTeamId('none')}
        className={`flex-shrink-0 px-3 py-1 text-xs font-medium rounded-full ${selectedTeamId === 'none' ? 'bg-zinc-600 text-white' : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'}`}>未所属</button>
    </div>
  );
}

// ========== 日表示 ==========
function ShiftDayView({ currentDate, setCurrentDate, staff, shiftTypes, dayOff, shifts, setShifts, areas, setAreas, aiSettings, teams }) {
  const dialog = useDialog();
  const { isAdmin } = useAuth();
  const [editingCell, setEditingCell] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedTeamId, setSelectedTeamId] = useState('all');

  const teamById = useMemo(() => { const m = {}; teams.forEach(t => m[t.id] = t); return m; }, [teams]);
  const stById = useMemo(() => { const m = {}; shiftTypes.forEach(st => m[st.id] = st); return m; }, [shiftTypes]);

  const filteredStaff = useMemo(() => {
    let list = staff;
    if (selectedTeamId === 'none') list = list.filter(s => !s.teamId || !teamById[s.teamId]);
    else if (selectedTeamId !== 'all') list = list.filter(s => s.teamId === selectedTeamId);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(s => s.name.toLowerCase().includes(q) || (s.vehicle || '').toLowerCase().includes(q) || (s.area || '').toLowerCase().includes(q));
    }
    return list;
  }, [staff, searchQuery, selectedTeamId, teamById]);

  const dateObj = parseYmd(currentDate);
  const dow = dateObj.getDay();

  // シフト区分ごとにグルーピング
  const grouped = useMemo(() => {
    const byShiftType = {};
    shiftTypes.forEach(st => { byShiftType[st.id] = []; });
    const offList = [];
    const reqOffList = [];
    const fixedOffList = [];
    const unassigned = [];

    filteredStaff.forEach(s => {
      const v = normalizeShift(shifts[`${currentDate}:${s.id}`]);
      const isReq = (dayOff[s.id] || []).includes(currentDate);
      if (v === 'reqoff' || isReq) reqOffList.push(s);
      else if (v === 'off') {
        if (isFixedDayOff(s, dow)) fixedOffList.push(s);
        else offList.push(s);
      }
      else if (Array.isArray(v) && v.some(slot => slot && slot.shiftTypeId)) {
        v.forEach(slot => {
          if (slot && slot.shiftTypeId && byShiftType[slot.shiftTypeId]) {
            byShiftType[slot.shiftTypeId].push({ staff: s, slot });
          }
        });
      } else if (isFixedDayOff(s, dow)) fixedOffList.push(s);
      else unassigned.push(s);
    });

    return { byShiftType, offList, reqOffList, fixedOffList, unassigned };
  }, [filteredStaff, shifts, currentDate, dow, shiftTypes, dayOff]);

  const handleCellClick = (s) => {
    if (!isAdmin) return;
    setEditingCell({ date: currentDate, staffId: s.id, staff: s });
  };

  const handleCellSave = async (date, staffId, value) => {
    await setShifts(prev => {
      const next = { ...prev };
      const key = `${date}:${staffId}`;
      if (value === null) delete next[key];
      else next[key] = value;
      return next;
    });
    setEditingCell(null);
  };

  const exportCSV = () => {
    const header = ['シフト区分', '氏名', '班', '号車', 'コース'];
    const rows = [];
    shiftTypes.forEach(st => {
      grouped.byShiftType[st.id].forEach(({ staff: s, slot }) => {
        rows.push([st.name, s.name, teamById[s.teamId]?.name || '', s.vehicle || '', slot.area || s.area || '']);
      });
    });
    grouped.reqOffList.forEach(s => rows.push(['希望休', s.name, teamById[s.teamId]?.name || '', s.vehicle || '', '']));
    [...grouped.offList, ...grouped.fixedOffList].forEach(s => rows.push(['公休', s.name, teamById[s.teamId]?.name || '', s.vehicle || '', '']));
    const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `hakoshift_${currentDate}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  if (staff.length === 0) {
    return <div className="px-4"><EmptyState icon="Users" title="スタッフが未登録です" description={isAdmin ? 'メニュー → スタッフ から先にメンバーを登録してください。' : '管理者がスタッフを登録するまでお待ちください。'} /></div>;
  }

  return (
    <div className="space-y-3">
      <ShiftToolbar onExportCSV={exportCSV} searchQuery={searchQuery} setSearchQuery={setSearchQuery} isAdmin={isAdmin} hideMonthlyOps={true} />
      {!isAdmin && (
        <div className="mx-3 px-3 py-2 bg-zinc-800/50 border border-zinc-700 rounded-lg text-xs text-zinc-400 flex items-center gap-2">
          <Icon name="Eye" className="w-3.5 h-3.5" />閲覧モードです。編集には管理者ログインが必要です。
        </div>
      )}
      <TeamFilter teams={teams} selectedTeamId={selectedTeamId} setSelectedTeamId={setSelectedTeamId} />

      <div className="px-3">
        <div className="bg-zinc-800/50 rounded-xl px-4 py-3 mb-3">
          <div className="text-lg font-bold text-zinc-100">{dayLabel(currentDate)}</div>
          <div className="text-xs text-zinc-400 mt-0.5">朝の点呼用一覧</div>
        </div>

        <div className="space-y-3">
          {shiftTypes.map(st => {
            const list = grouped.byShiftType[st.id];
            if (list.length === 0) return null;
            return (
              <section key={st.id} className="bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden">
                <div className="px-4 py-2.5 flex items-center gap-2" style={{ background: st.color + '22', borderLeft: `4px solid ${st.color}` }}>
                  <Icon name="Clock" className="w-4 h-4" style={{ color: st.color }} />
                  <div className="font-bold text-sm text-zinc-100">{st.name}</div>
                  <div className="text-xs text-zinc-400">{st.time}</div>
                  <div className="ml-auto text-xs font-bold text-zinc-300 bg-zinc-700/70 px-2 py-0.5 rounded-full">{list.length}名</div>
                </div>
                <div className="divide-y divide-zinc-700/50">
                  {list.map(({ staff: s, slot }, i) => {
                    const team = s.teamId && teamById[s.teamId];
                    const area = slot.area || s.area || '';
                    return (
                      <button key={`${s.id}-${i}`} onClick={() => handleCellClick(s)} disabled={!isAdmin}
                        className={`w-full px-4 py-2.5 flex items-center gap-3 transition-colors text-left ${isAdmin ? 'hover:bg-zinc-700/40' : ''}`}>
                        {team && <span className="w-1 h-8 rounded-full flex-shrink-0" style={{ background: team.color }}></span>}
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="font-semibold text-sm text-zinc-100">{s.name}</span>
                            {s.role && <span className="text-[10px] px-1.5 py-0.5 bg-zinc-700 text-zinc-300 rounded">{s.role}</span>}
                          </div>
                          <div className="flex items-center gap-3 text-xs text-zinc-400 mt-0.5">
                            {s.vehicle && <span className="flex items-center gap-1"><Icon name="Truck" className="w-3 h-3 text-amber-500" />{s.vehicle}</span>}
                            {area && <span className="flex items-center gap-1"><Icon name="MapPin" className="w-3 h-3 text-rose-400" />{area}</span>}
                            {team && <span className="text-zinc-500">{team.name}</span>}
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </section>
            );
          })}

          {grouped.reqOffList.length > 0 && (
            <section className="bg-red-950/20 border border-red-800/40 rounded-xl overflow-hidden">
              <div className="px-4 py-2.5 flex items-center gap-2 bg-red-500/10 border-l-4 border-red-500">
                <Icon name="CalendarOff" className="w-4 h-4 text-red-400" />
                <div className="font-bold text-sm text-red-300">希望休</div>
                <div className="ml-auto text-xs font-bold text-red-300 bg-red-500/20 px-2 py-0.5 rounded-full">{grouped.reqOffList.length}名</div>
              </div>
              <div className="px-4 py-3 flex flex-wrap gap-2">
                {grouped.reqOffList.map(s => (
                  <button key={s.id} onClick={() => handleCellClick(s)} disabled={!isAdmin}
                    className="text-sm px-3 py-1.5 bg-red-900/30 text-red-200 rounded-lg hover:bg-red-900/50 transition-colors">
                    {s.name}
                  </button>
                ))}
              </div>
            </section>
          )}

          {(grouped.offList.length + grouped.fixedOffList.length > 0) && (
            <section className="bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden">
              <div className="px-4 py-2.5 flex items-center gap-2 bg-zinc-700/30 border-l-4 border-zinc-500">
                <Icon name="CalendarOff" className="w-4 h-4 text-zinc-400" />
                <div className="font-bold text-sm text-zinc-200">公休</div>
                <div className="ml-auto text-xs font-bold text-zinc-300 bg-zinc-700 px-2 py-0.5 rounded-full">{grouped.offList.length + grouped.fixedOffList.length}名</div>
              </div>
              <div className="px-4 py-3 flex flex-wrap gap-2">
                {[...grouped.offList, ...grouped.fixedOffList].map(s => {
                  const isFixed = grouped.fixedOffList.includes(s);
                  return (
                    <button key={s.id} onClick={() => handleCellClick(s)} disabled={!isAdmin}
                      className={`text-sm px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1 ${
                        isFixed ? 'bg-zinc-900 text-zinc-400 hover:bg-zinc-700' : 'bg-zinc-700 text-zinc-200 hover:bg-zinc-600'
                      }`}>
                      {isFixed && <Icon name="Repeat" className="w-3 h-3" />}{s.name}
                    </button>
                  );
                })}
              </div>
            </section>
          )}

          {grouped.unassigned.length > 0 && (
            <section className="bg-zinc-800/50 border border-dashed border-zinc-700 rounded-xl overflow-hidden">
              <div className="px-4 py-2.5 flex items-center gap-2">
                <Icon name="HelpCircle" className="w-4 h-4 text-zinc-500" />
                <div className="font-bold text-sm text-zinc-400">未割当</div>
                <div className="ml-auto text-xs font-bold text-zinc-400 bg-zinc-700/50 px-2 py-0.5 rounded-full">{grouped.unassigned.length}名</div>
              </div>
              <div className="px-4 py-3 flex flex-wrap gap-2">
                {grouped.unassigned.map(s => (
                  <button key={s.id} onClick={() => handleCellClick(s)} disabled={!isAdmin}
                    className="text-sm px-3 py-1.5 bg-zinc-800 text-zinc-300 border border-dashed border-zinc-600 rounded-lg hover:bg-zinc-700 transition-colors">
                    {s.name}
                  </button>
                ))}
              </div>
            </section>
          )}
        </div>
      </div>

      {editingCell && isAdmin && (
        <CellEditModal editingCell={editingCell} shiftTypes={shiftTypes}
          currentValue={normalizeShift(shifts[`${editingCell.date}:${editingCell.staffId}`])}
          isReqOff={(dayOff[editingCell.staffId] || []).includes(editingCell.date)}
          areas={areas} setAreas={setAreas} onSave={handleCellSave} onClose={() => setEditingCell(null)} allStaff={staff} allShifts={shifts} />
      )}
    </div>
  );
}

// ========== 週表示 ==========
function ShiftWeekView({ currentWeekStart, staff, shiftTypes, dayOff, shifts, setShifts, areas, setAreas, aiSettings, teams }) {
  const dialog = useDialog();
  const { isAdmin } = useAuth();
  const [editingCell, setEditingCell] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedTeamId, setSelectedTeamId] = useState('all');

  const weekDays = useMemo(() => getWeekDays(parseYmd(currentWeekStart)), [currentWeekStart]);
  const teamById = useMemo(() => { const m = {}; teams.forEach(t => m[t.id] = t); return m; }, [teams]);
  const stById = useMemo(() => { const m = {}; shiftTypes.forEach(st => m[st.id] = st); return m; }, [shiftTypes]);

  const filteredStaff = useMemo(() => {
    let list = staff;
    if (selectedTeamId === 'none') list = list.filter(s => !s.teamId || !teamById[s.teamId]);
    else if (selectedTeamId !== 'all') list = list.filter(s => s.teamId === selectedTeamId);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(s => s.name.toLowerCase().includes(q) || (s.vehicle || '').toLowerCase().includes(q) || (s.area || '').toLowerCase().includes(q));
    }
    return list;
  }, [staff, searchQuery, selectedTeamId, teamById]);

  const groupedStaff = useMemo(() => {
    const groups = [];
    teams.forEach(t => {
      const members = filteredStaff.filter(s => s.teamId === t.id);
      if (members.length > 0) groups.push({ team: t, members });
    });
    const unassigned = filteredStaff.filter(s => !s.teamId || !teamById[s.teamId]);
    if (unassigned.length > 0) groups.push({ team: null, members: unassigned });
    return groups;
  }, [filteredStaff, teams, teamById]);

  const isDayOff = useCallback((sid, date) => (dayOff[sid] || []).includes(date), [dayOff]);

  const handleCellClick = (s, d) => {
    if (!isAdmin) return;
    setEditingCell({ date: d.date, staffId: s.id, staff: s });
  };

  const handleCellSave = async (date, staffId, value) => {
    await setShifts(prev => {
      const next = { ...prev };
      const key = `${date}:${staffId}`;
      if (value === null) delete next[key];
      else next[key] = value;
      return next;
    });
    setEditingCell(null);
  };

  const exportCSV = () => {
    const header = ['氏名', '班', ...weekDays.map(d => `${d.month}/${d.day}(${DOW[d.dow]})`)];
    const rows = filteredStaff.map(s => {
      const cells = weekDays.map(d => {
        const v = normalizeShift(shifts[`${d.date}:${s.id}`]);
        if (v === 'reqoff') return '希望休';
        if (v === 'off') return '公休';
        if (Array.isArray(v)) {
          return v.filter(slot => slot && slot.shiftTypeId).map(slot => stById[slot.shiftTypeId]?.name || '').join(' / ');
        }
        return '';
      });
      return [s.name, teamById[s.teamId]?.name || '', ...cells];
    });
    const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `hakoshift_week_${currentWeekStart}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  if (staff.length === 0) {
    return <div className="px-4"><EmptyState icon="Users" title="スタッフが未登録です" description={isAdmin ? 'メニュー → スタッフ から先にメンバーを登録してください。' : '管理者がスタッフを登録するまでお待ちください。'} /></div>;
  }

  return (
    <div className="space-y-3">
      <ShiftToolbar onExportCSV={exportCSV} searchQuery={searchQuery} setSearchQuery={setSearchQuery} isAdmin={isAdmin} hideMonthlyOps={true} />
      {!isAdmin && (
        <div className="mx-3 px-3 py-2 bg-zinc-800/50 border border-zinc-700 rounded-lg text-xs text-zinc-400 flex items-center gap-2">
          <Icon name="Eye" className="w-3.5 h-3.5" />閲覧モードです。編集には管理者ログインが必要です。
        </div>
      )}
      <TeamFilter teams={teams} selectedTeamId={selectedTeamId} setSelectedTeamId={setSelectedTeamId} />

      <div className="px-3">
        <div className="text-sm font-medium text-zinc-300 mb-2">{weekLabel(parseYmd(currentWeekStart))}</div>
      </div>

      <div className="overflow-x-auto bg-zinc-900 border-y border-zinc-800">
        <table className="border-collapse w-full" style={{ minWidth: '100%' }}>
          <thead>
            <tr>
              <th className="sticky left-0 z-10 bg-zinc-900 border-b border-r border-zinc-800 px-3 py-2 text-left text-xs font-medium text-zinc-400 min-w-[140px]">スタッフ</th>
              {weekDays.map(d => (
                <th key={d.date} className="border-b border-zinc-800 px-1 py-2 font-normal min-w-[100px]"
                  style={{ color: d.dow === 0 ? '#f87171' : d.dow === 6 ? '#60a5fa' : '#a1a1aa' }}>
                  <div className="text-[10px] uppercase tracking-wider opacity-70">{DOW[d.dow]}</div>
                  <div className="text-base font-normal">{d.month}/{d.day}</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {groupedStaff.map((group, gi) => (
              <Fragment key={group.team?.id || `unassigned-${gi}`}>
                <tr>
                  <td colSpan={8} className="sticky left-0 z-[5] bg-zinc-800/80 border-y border-zinc-700 px-3 py-1.5"
                    style={group.team ? { borderLeftWidth: '3px', borderLeftColor: group.team.color, borderLeftStyle: 'solid' } : {}}>
                    <div className="flex items-center gap-2">
                      {group.team ? (
                        <Fragment>
                          <span className="w-2.5 h-2.5 rounded-full" style={{ background: group.team.color }}></span>
                          <span className="text-xs font-bold text-zinc-100">{group.team.name}</span>
                        </Fragment>
                      ) : (
                        <Fragment>
                          <Icon name="UsersRound" className="w-3 h-3 text-zinc-500" />
                          <span className="text-xs font-bold text-zinc-400">未所属</span>
                        </Fragment>
                      )}
                      <span className="text-[10px] text-zinc-500">{group.members.length}名</span>
                    </div>
                  </td>
                </tr>
                {group.members.map(s => {
                  const team = group.team;
                  return (
                    <tr key={s.id} className="border-b border-zinc-800/50">
                      <td className="sticky left-0 z-10 bg-zinc-900 border-r border-zinc-800 px-3 py-2 align-top"
                        style={team ? { borderLeftWidth: '3px', borderLeftColor: team.color, borderLeftStyle: 'solid' } : {}}>
                        <div className="font-medium text-sm text-zinc-100 truncate">{s.name}</div>
                        {s.vehicle && <div className="flex items-center gap-1 text-[10px] text-amber-500/90 mt-0.5"><Icon name="Truck" className="w-2.5 h-2.5" /><span className="truncate">{s.vehicle}</span></div>}
                        {s.area && <div className="flex items-center gap-1 text-[10px] text-zinc-500"><Icon name="MapPin" className="w-2.5 h-2.5" /><span className="truncate">{s.area}</span></div>}
                      </td>
                      {weekDays.map(d => {
                        const v = normalizeShift(shifts[`${d.date}:${s.id}`]);
                        const isReq = isDayOff(s.id, d.date);
                        const isFixed = isFixedDayOff(s, d.dow);
                        const bg = d.dow === 0 ? 'bg-red-950/10' : d.dow === 6 ? 'bg-blue-950/10' : '';
                        return (
                          <td key={d.date}
                            className={`border-r border-zinc-800/50 align-top p-1 transition-colors ${bg} ${isAdmin ? 'cursor-pointer hover:bg-zinc-800/40' : ''}`}
                            style={{ minHeight: '60px', height: '60px' }}
                            onClick={() => handleCellClick(s, d)}>
                            <CellContent value={v} stById={stById} staffArea={s.area} isReqOff={isReq} isFixedOff={isFixed} />
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </Fragment>
            ))}
          </tbody>
        </table>
      </div>

      {editingCell && isAdmin && (
        <CellEditModal editingCell={editingCell} shiftTypes={shiftTypes}
          currentValue={normalizeShift(shifts[`${editingCell.date}:${editingCell.staffId}`])}
          isReqOff={isDayOff(editingCell.staffId, editingCell.date)}
          areas={areas} setAreas={setAreas} onSave={handleCellSave} onClose={() => setEditingCell(null)} allStaff={staff} allShifts={shifts} />
      )}
    </div>
  );
}

// ========== 月表示 ==========
function ShiftMonthView({ currentMonth, days, staff, shiftTypes, dayOff, shifts, setShifts, areas, setAreas, aiSettings, teams }) {
  const dialog = useDialog();
  const { isAdmin } = useAuth();
  const [editingCell, setEditingCell] = useState(null);
  const [generating, setGenerating] = useState(false);
  const [previewing, setPreviewing] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedTeamId, setSelectedTeamId] = useState('all');

  const teamById = useMemo(() => { const m = {}; teams.forEach(t => m[t.id] = t); return m; }, [teams]);
  const stById = useMemo(() => { const m = {}; shiftTypes.forEach(st => m[st.id] = st); return m; }, [shiftTypes]);

  const filteredStaff = useMemo(() => {
    let list = staff;
    if (selectedTeamId === 'none') list = list.filter(s => !s.teamId || !teamById[s.teamId]);
    else if (selectedTeamId !== 'all') list = list.filter(s => s.teamId === selectedTeamId);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(s => s.name.toLowerCase().includes(q) || (s.vehicle || '').toLowerCase().includes(q) || (s.area || '').toLowerCase().includes(q) || (s.role || '').toLowerCase().includes(q));
    }
    return list;
  }, [staff, searchQuery, selectedTeamId, teamById]);

  const groupedStaff = useMemo(() => {
    const groups = [];
    teams.forEach(t => {
      const members = filteredStaff.filter(s => s.teamId === t.id);
      if (members.length > 0) groups.push({ team: t, members });
    });
    const unassigned = filteredStaff.filter(s => !s.teamId || !teamById[s.teamId]);
    if (unassigned.length > 0) groups.push({ team: null, members: unassigned });
    return groups;
  }, [filteredStaff, teams, teamById]);

  const isDayOff = useCallback((sid, date) => (dayOff[sid] || []).includes(date), [dayOff]);
  const getCellValue = useCallback((date, sid) => normalizeShift(shifts[`${date}:${sid}`]), [shifts]);

  const consecutiveAlerts = useMemo(() => calcConsecutiveAlerts(staff, days, shifts, dayOff, aiSettings.warnConsecutiveDays || CONSECUTIVE_WORK_LIMIT), [staff, days, shifts, dayOff, aiSettings.warnConsecutiveDays]);
  const vehicleOverlaps = useMemo(() => calcVehicleOverlapAlerts(staff, days, shifts), [staff, days, shifts]);
  const areaOverlaps = useMemo(() => calcAreaOverlapAlerts(staff, days, shifts), [staff, days, shifts]);

  const totalConsCount = useMemo(() => Object.values(consecutiveAlerts).reduce((sum, set) => sum + (set.size > 0 ? 1 : 0), 0), [consecutiveAlerts]);
  const totalVOverlap = useMemo(() => Object.keys(vehicleOverlaps).length, [vehicleOverlaps]);
  const totalAOverlap = useMemo(() => Object.keys(areaOverlaps).length, [areaOverlaps]);

  const handleAutoGen = async () => {
    if (staff.length === 0) { await dialog.alert({ message: 'まずスタッフを登録してください' }); return; }
    setGenerating(true);
    await new Promise(r => setTimeout(r, 400));
    const generated = generateShifts(staff, days, dayOff, shiftTypes, aiSettings);
    setGenerating(false);
    setPreviewing(generated);
  };

  const handleApply = async () => {
    if (previewing) { await setShifts(previewing); setPreviewing(null); }
  };

  const handleClearMonth = async () => {
    const ok = await dialog.confirm({ title: '月次クリア', message: `${monthLabel(currentMonth)}のシフトをすべて削除します。\nこの操作は取り消せません。`, confirmText: 'すべて削除' });
    if (!ok) return;
    await setShifts({});
  };

  const handleCellSave = async (date, staffId, value) => {
    await setShifts(prev => {
      const next = { ...prev };
      const key = `${date}:${staffId}`;
      if (value === null) delete next[key];
      else next[key] = value;
      return next;
    });
    setEditingCell(null);
  };

  const handleCellClick = (s, d) => {
    if (!isAdmin) return;
    setEditingCell({ date: d.date, staffId: s.id, staff: s });
  };

  const exportCSV = () => {
    const header = ['氏名', '班', '役職', '号車', 'デフォルトコース', '固定休み', ...days.map(d => `${d.day}(${DOW[d.dow]})`)];
    const rows = staff.map(s => {
      const teamName = teamById[s.teamId]?.name || '';
      const fixedOffStr = (s.fixedDayOff || []).map(dow => DOW[dow]).join('・');
      const cells = days.map(d => {
        const v = getCellValue(d.date, s.id);
        if (v === 'reqoff') return '希望休';
        if (v === 'off') return isDayOff(s.id, d.date) ? '希望休' : '公休';
        if (Array.isArray(v)) return v.filter(slot => slot && slot.shiftTypeId).map(slot => {
          const stName = stById[slot.shiftTypeId]?.name || '';
          return slot.area ? `${stName}(${slot.area})` : stName;
        }).join(' / ');
        return '';
      });
      return [s.name, teamName, s.role || '', s.vehicle || '', s.area || '', fixedOffStr, ...cells];
    });
    const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `hakoshift_${currentMonth}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  if (staff.length === 0) {
    return <div className="px-4"><EmptyState icon="Users" title="スタッフが未登録です" description={isAdmin ? 'メニュー → スタッフ から先にメンバーを登録してください。' : '管理者がスタッフを登録するまでお待ちください。'} /></div>;
  }

  return (
    <div className="space-y-3">
      <ShiftToolbar onAutoGen={handleAutoGen} generating={generating} onClearMonth={handleClearMonth}
        onExportCSV={exportCSV} searchQuery={searchQuery} setSearchQuery={setSearchQuery} isAdmin={isAdmin} />
      {!isAdmin && (
        <div className="mx-3 px-3 py-2 bg-zinc-800/50 border border-zinc-700 rounded-lg text-xs text-zinc-400 flex items-center gap-2">
          <Icon name="Eye" className="w-3.5 h-3.5" />閲覧モードです。編集には管理者ログインが必要です。
        </div>
      )}
      <TeamFilter teams={teams} selectedTeamId={selectedTeamId} setSelectedTeamId={setSelectedTeamId} />

      {(totalConsCount > 0 || totalVOverlap > 0 || totalAOverlap > 0) && (
        <div className="mx-3 px-3 py-2 bg-amber-500/10 border border-amber-500/30 rounded-lg flex flex-wrap gap-3 text-xs">
          {totalConsCount > 0 && <div className="flex items-center gap-1.5 text-amber-300"><Icon name="AlertTriangle" className="w-3.5 h-3.5" /><span><strong>{totalConsCount}名</strong>が{aiSettings.warnConsecutiveDays || CONSECUTIVE_WORK_LIMIT}連勤以上</span></div>}
          {totalVOverlap > 0 && <div className="flex items-center gap-1.5 text-orange-300"><Icon name="AlertTriangle" className="w-3.5 h-3.5" /><span><strong>{totalVOverlap}件</strong>の号車被り</span></div>}
          {totalAOverlap > 0 && <div className="flex items-center gap-1.5 text-yellow-300"><Icon name="AlertTriangle" className="w-3.5 h-3.5" /><span><strong>{totalAOverlap}件</strong>のコース被り</span></div>}
        </div>
      )}

      <div className="overflow-x-auto bg-zinc-900 border-y border-zinc-800">
        <table className="border-collapse" style={{ minWidth: '100%' }}>
          <thead>
            <tr>
              <th className="sticky left-0 z-10 bg-zinc-900 border-b border-r border-zinc-800 px-3 py-2 text-left text-xs font-medium text-zinc-400 min-w-[160px] w-[160px]">スタッフ</th>
              {days.map(d => (
                <th key={d.date} className="border-b border-zinc-800 px-1 py-2 font-normal min-w-[110px]"
                  style={{ color: d.dow === 0 ? '#f87171' : d.dow === 6 ? '#60a5fa' : '#a1a1aa' }}>
                  <div className="text-[10px] uppercase tracking-wider opacity-70">{DOW[d.dow]}</div>
                  <div className="text-lg font-normal">{d.day}</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {groupedStaff.map((group, gi) => (
              <Fragment key={group.team?.id || `unassigned-${gi}`}>
                <tr>
                  <td colSpan={days.length + 1} className="sticky left-0 z-[5] bg-zinc-800/80 border-y border-zinc-700 px-3 py-1.5"
                    style={group.team ? { borderLeftWidth: '3px', borderLeftColor: group.team.color, borderLeftStyle: 'solid' } : {}}>
                    <div className="flex items-center gap-2">
                      {group.team ? (<><span className="w-2.5 h-2.5 rounded-full" style={{ background: group.team.color }}></span><span className="text-xs font-bold text-zinc-100">{group.team.name}</span></>) : (<><Icon name="UsersRound" className="w-3 h-3 text-zinc-500" /><span className="text-xs font-bold text-zinc-400">未所属</span></>)}
                      <span className="text-[10px] text-zinc-500">{group.members.length}名</span>
                    </div>
                  </td>
                </tr>
                {group.members.map(s => {
                  const hasAlert = consecutiveAlerts[s.id]?.size > 0;
                  // この人にコース被りが何件あるか集計
                  const overlapCount = days.reduce((cnt, d) => {
                    return cnt + ((areaOverlaps[`${d.date}:${s.id}`] || vehicleOverlaps[`${d.date}:${s.id}`]) ? 1 : 0);
                  }, 0);
                  const fixedOffs = s.fixedDayOff || [];
                  const team = group.team;
                  return (
                    <tr key={s.id} className="border-b border-zinc-800/50">
                      <td className="sticky left-0 z-10 bg-zinc-900 border-r border-zinc-800 px-3 py-2 align-top"
                        style={team ? { borderLeftWidth: '3px', borderLeftColor: team.color, borderLeftStyle: 'solid' } : {}}>
                        <div className="flex items-center gap-1 flex-wrap">
                          {team && <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: team.color }}></span>}
                          {hasAlert && <span title="連勤アラート"><Icon name="AlertTriangle" className="w-3 h-3 text-amber-400 flex-shrink-0" /></span>}
                          {overlapCount > 0 && (
                            <span title="コース・号車被り" className="inline-flex items-center gap-0.5 px-1 py-0.5 bg-yellow-500/20 text-yellow-300 rounded text-[9px] font-bold">
                              <Icon name="AlertTriangle" className="w-2.5 h-2.5" />{overlapCount}
                            </span>
                          )}
                          <div className="font-medium text-sm text-zinc-100 truncate">{s.name}</div>
                        </div>
                        <div className="mt-1 space-y-0.5">
                          {s.role && <div className="text-[10px] text-zinc-500 truncate">{s.role}</div>}
                          {s.vehicle && <div className="flex items-center gap-1 text-[10px] text-amber-500/90"><Icon name="Truck" className="w-2.5 h-2.5" /><span className="truncate">{s.vehicle}</span></div>}
                          {s.area && <div className="flex items-center gap-1 text-[10px] text-zinc-500"><Icon name="MapPin" className="w-2.5 h-2.5" /><span className="truncate">{s.area}</span></div>}
                          {fixedOffs.length > 0 && <div className="flex items-center gap-1 text-[10px] text-zinc-500"><Icon name="Repeat" className="w-2.5 h-2.5" /><span className="truncate">{fixedOffs.map(dow => DOW[dow]).join('・')}休</span></div>}
                        </div>
                      </td>
                      {days.map(d => {
                        const v = getCellValue(d.date, s.id);
                        const isReq = isDayOff(s.id, d.date);
                        const isFixed = isFixedDayOff(s, d.dow);
                        const bg = d.dow === 0 ? 'bg-red-950/10' : d.dow === 6 ? 'bg-blue-950/10' : '';
                        const isCons = consecutiveAlerts[s.id]?.has(d.date);
                        const isVO = vehicleOverlaps[`${d.date}:${s.id}`];
                        const isAO = areaOverlaps[`${d.date}:${s.id}`];
                        let alertCls = '';
                        if (isVO && isAO) alertCls = 'ring-2 ring-red-500 ring-inset bg-gradient-to-br from-orange-500/30 to-yellow-500/30';
                        else if (isVO) alertCls = 'ring-2 ring-orange-500 ring-inset bg-orange-500/20';
                        else if (isAO) alertCls = 'ring-2 ring-yellow-400 ring-inset bg-yellow-500/20';
                        else if (isCons) alertCls = 'ring-2 ring-amber-500/60 ring-inset';
                        return (
                          <td key={d.date}
                            className={`border-r border-zinc-800/50 align-top p-1 transition-colors ${alertCls || bg} ${isAdmin ? 'cursor-pointer hover:bg-zinc-800/40' : ''}`}
                            style={{ minHeight: '64px', height: '64px' }}
                            onClick={() => handleCellClick(s, d)}>
                            <CellContent value={v} stById={stById} staffArea={s.area} isReqOff={isReq} isFixedOff={isFixed} hasOverlapAlert={isVO || isAO} />
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </Fragment>
            ))}
          </tbody>
        </table>
      </div>

      <p className="text-xs text-zinc-500 text-center px-4 flex flex-wrap items-center justify-center gap-x-2 gap-y-1">
        {isAdmin && <span>セルをタップで編集</span>}
        <span className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-orange-500/20 text-orange-300 rounded"><span>⚠</span>号車被り</span>
        <span className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-yellow-500/20 text-yellow-300 rounded"><span>⚠</span>コース被り</span>
        <span className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-amber-500/10 text-amber-400 rounded"><span>⚠</span>連勤</span>
      </p>

      {editingCell && isAdmin && (
        <CellEditModal editingCell={editingCell} shiftTypes={shiftTypes}
          currentValue={getCellValue(editingCell.date, editingCell.staffId)}
          isReqOff={isDayOff(editingCell.staffId, editingCell.date)}
          areas={areas} setAreas={setAreas} onSave={handleCellSave} onClose={() => setEditingCell(null)} allStaff={staff} allShifts={shifts} />
      )}
      {previewing && isAdmin && (
        <GenerationPreviewModal currentShifts={shifts} previewShifts={previewing}
          staff={staff} days={days} dayOff={dayOff} shiftTypes={shiftTypes} aiSettings={aiSettings}
          onApply={handleApply} onCancel={() => setPreviewing(null)} />
      )}
    </div>
  );
}

// ========== セル内表示 ==========
function CellContent({ value, stById, staffArea, isReqOff, isFixedOff, hasOverlapAlert }) {
  if (value === 'reqoff' || (isReqOff && (!value || value === 'off'))) {
    return <div className="w-full h-full flex items-center justify-center bg-red-500 rounded text-white text-[11px] font-semibold">希望休</div>;
  }
  if (value === 'off') {
    return <div className="w-full h-full flex items-center justify-center bg-zinc-700 border border-zinc-600 rounded text-zinc-300 text-[11px] font-medium gap-0.5">{isFixedOff && <Icon name="Repeat" className="w-2.5 h-2.5" />}公休</div>;
  }
  if (!value && isFixedOff) {
    return <div className="w-full h-full flex items-center justify-center bg-zinc-800/60 border border-dashed border-zinc-600 rounded text-zinc-500 text-[11px] gap-0.5"><Icon name="Repeat" className="w-2.5 h-2.5" />公休</div>;
  }
  if (!value) return null;
  if (Array.isArray(value)) {
    const slots = value.filter(slot => slot && slot.shiftTypeId);
    if (slots.length === 0) return null;
    return (
      <div className={`w-full h-full flex flex-col gap-0.5 ${isReqOff ? 'ring-2 ring-red-500 ring-inset rounded' : ''} relative`}>
        {hasOverlapAlert && (
          <div className="absolute -top-1 -right-1 z-20 w-4 h-4 bg-yellow-400 rounded-full flex items-center justify-center shadow-lg">
            <Icon name="AlertTriangle" className="w-2.5 h-2.5 text-yellow-900" />
          </div>
        )}
        {slots.map((slot, i) => {
          const st = stById[slot.shiftTypeId];
          if (!st) return null;
          const showArea = slot.area || (slots.length === 1 && staffArea);
          const areaText = slot.area || staffArea || '';
          const isCustom = slot.area && slot.area !== staffArea;
          return (
            <div key={i} className="flex-1 px-1.5 py-0.5 rounded text-white overflow-hidden" style={{ background: st.color, minHeight: '20px' }}>
              <div className="text-[11px] font-semibold leading-tight truncate">{st.name}</div>
              {slots.length === 1 && <div className="text-[9px] opacity-90 leading-tight truncate">{st.time}</div>}
              {showArea && <div className={`text-[9px] leading-tight truncate ${isCustom ? 'font-bold' : 'opacity-80'}`}>{isCustom ? '★' : ''}{areaText}</div>}
            </div>
          );
        })}
      </div>
    );
  }
  return null;
}

// ========== セル編集モーダル ==========
function CellEditModal({ editingCell, shiftTypes, currentValue, isReqOff, areas, setAreas, onSave, onClose, allStaff, allShifts }) {
  const dialog = useDialog();
  const [, m, d] = editingCell.date.split('-');
  const dateLabel = `${parseInt(m)}月${parseInt(d)}日`;
  const dow = parseYmd(editingCell.date).getDay();
  const isFixedOff = isFixedDayOff(editingCell.staff, dow);
  const stById = useMemo(() => { const map = {}; shiftTypes.forEach(st => map[st.id] = st); return map; }, [shiftTypes]);

  const initial = useMemo(() => {
    if (currentValue === 'reqoff') return { mode: 'reqoff', slots: [null, null] };
    if (currentValue === 'off') return { mode: 'off', slots: [null, null] };
    if (Array.isArray(currentValue)) return { mode: 'work', slots: [currentValue[0] || null, currentValue[1] || null] };
    return { mode: 'empty', slots: [null, null] };
  }, [currentValue]);
  const [mode, setMode] = useState(initial.mode);
  const [slots, setSlots] = useState(initial.slots);

  const handleSelect = (i, stId) => {
    setMode('work');
    const next = [...slots];
    if (next[i] && next[i].shiftTypeId === stId) next[i] = null;
    else next[i] = { shiftTypeId: stId, area: next[i]?.area || '' };
    setSlots(next);
  };
  const handleAreaChange = (i, area) => {
    const next = [...slots];
    if (next[i]) { next[i] = { ...next[i], area }; setSlots(next); }
  };
  // 被り検知: 同日・同シフト区分・同コース or 同号車のスタッフを抽出
  const detectOverlaps = () => {
    if (mode !== 'work' || !allStaff || !allShifts) return [];
    const myStaff = editingCell.staff;
    const myArea = myStaff.area || '';
    const myVehicle = myStaff.vehicle || '';
    const overlaps = [];
    slots.forEach((slot, slotIdx) => {
      if (!slot || !slot.shiftTypeId) return;
      const useArea = slot.area || myArea;
      allStaff.forEach(other => {
        if (other.id === editingCell.staffId) return;
        const otherV = normalizeShift(allShifts[`${editingCell.date}:${other.id}`]);
        if (!Array.isArray(otherV)) return;
        otherV.forEach(otherSlot => {
          if (!otherSlot || !otherSlot.shiftTypeId) return;
          if (otherSlot.shiftTypeId !== slot.shiftTypeId) return;
          const otherArea = otherSlot.area || other.area || '';
          const otherVehicle = other.vehicle || '';
          // コース被り
          if (useArea && otherArea && useArea === otherArea) {
            overlaps.push({ type: 'course', staff: other, value: useArea, shiftTypeName: stById[slot.shiftTypeId]?.name || '' });
          }
          // 号車被り
          if (myVehicle && otherVehicle && myVehicle === otherVehicle) {
            overlaps.push({ type: 'vehicle', staff: other, value: myVehicle, shiftTypeName: stById[slot.shiftTypeId]?.name || '' });
          }
        });
      });
    });
    return overlaps;
  };

  const performSave = async () => {
    const newAreas = [...areas];
    slots.forEach(slot => { if (slot?.area && !newAreas.includes(slot.area)) newAreas.push(slot.area); });
    if (newAreas.length !== areas.length) await setAreas(newAreas);
    if (mode === 'reqoff') onSave(editingCell.date, editingCell.staffId, 'reqoff');
    else if (mode === 'off') onSave(editingCell.date, editingCell.staffId, 'off');
    else if (!slots[0] && !slots[1]) onSave(editingCell.date, editingCell.staffId, null);
    else onSave(editingCell.date, editingCell.staffId, slots);
  };

  const handleSave = async () => {
    const overlaps = detectOverlaps();
    if (overlaps.length > 0) {
      // 重複を整形してメッセージ作成
      const courseList = overlaps.filter(o => o.type === 'course');
      const vehicleList = overlaps.filter(o => o.type === 'vehicle');
      let msg = '⚠️ 被りが検出されました\n\n';
      if (courseList.length > 0) {
        msg += '【コース被り】\n';
        courseList.forEach(o => {
          msg += `・${o.shiftTypeName} で「${o.value}」が ${o.staff.name} さんと重複\n`;
        });
        msg += '\n';
      }
      if (vehicleList.length > 0) {
        msg += '【号車被り】\n';
        vehicleList.forEach(o => {
          msg += `・${o.shiftTypeName} で「${o.value}」が ${o.staff.name} さんと重複\n`;
        });
        msg += '\n';
      }
      msg += 'このまま保存しますか？';
      const ok = await dialog.confirm({
        title: '被り確認',
        message: msg,
        confirmText: 'このまま保存',
        cancelText: '修正する',
        danger: false,
      });
      if (!ok) return;
    }
    await performSave();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
      <div className="bg-zinc-800 border border-zinc-700 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between p-4 border-b border-zinc-700">
          <div>
            <div className="text-xs text-zinc-400 flex items-center gap-2 flex-wrap">
              {dateLabel}
              {isReqOff && <span className="px-1.5 py-0.5 bg-red-500/20 text-red-300 rounded text-[10px] font-semibold">希望休</span>}
              {isFixedOff && <span className="px-1.5 py-0.5 bg-zinc-700 text-zinc-300 rounded text-[10px] font-semibold flex items-center gap-0.5"><Icon name="Repeat" className="w-2.5 h-2.5" />固定休み</span>}
            </div>
            <div className="font-semibold text-zinc-100">{editingCell.staff.name}</div>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-5 h-5 text-zinc-300" /></button>
        </div>
        <div className="p-4 space-y-3 overflow-y-auto">
          <div>
            <div className="text-xs font-semibold text-zinc-400 mb-2">休み</div>
            <div className="grid grid-cols-2 gap-2">
              <button onClick={() => setMode(mode === 'reqoff' ? 'empty' : 'reqoff')}
                className={`p-3 rounded-lg border text-left ${mode === 'reqoff' ? 'border-red-400 bg-red-500/15' : 'border-zinc-700 hover:bg-zinc-700/50'}`}>
                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-red-500"></span><span className="text-sm font-medium text-zinc-100">希望休</span>{mode === 'reqoff' && <Icon name="Check" className="w-4 h-4 text-red-400 ml-auto" />}</div>
                <div className="text-[10px] text-zinc-500 mt-0.5">本人希望の休み</div>
              </button>
              <button onClick={() => setMode(mode === 'off' ? 'empty' : 'off')}
                className={`p-3 rounded-lg border text-left ${mode === 'off' ? 'border-zinc-400 bg-zinc-700' : 'border-zinc-700 hover:bg-zinc-700/50'}`}>
                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-zinc-600 border border-zinc-500"></span><span className="text-sm font-medium text-zinc-100">公休</span>{mode === 'off' && <Icon name="Check" className="w-4 h-4 text-zinc-300 ml-auto" />}</div>
                <div className="text-[10px] text-zinc-500 mt-0.5">通常の休み</div>
              </button>
            </div>
          </div>
          <div className="text-center text-xs text-zinc-500">または</div>
          {[0, 1].map(i => (
            <SlotEditor key={i} slotIdx={i} slot={slots[i]} shiftTypes={shiftTypes} areas={areas}
              disabled={mode === 'off' || mode === 'reqoff'}
              onSelectShiftType={handleSelect} onAreaChange={handleAreaChange}
              onClear={() => { const next = [...slots]; next[i] = null; setSlots(next); }}
              defaultArea={editingCell.staff.area} />
          ))}
        </div>
        <div className="p-4 border-t border-zinc-700 flex gap-2">
          <button onClick={() => onSave(editingCell.date, editingCell.staffId, null)} className="px-3 py-2 text-sm text-zinc-400 hover:bg-zinc-700 rounded-lg">すべてクリア</button>
          <div className="flex-1"></div>
          <button onClick={onClose} className="px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-700 rounded-lg">キャンセル</button>
          <button onClick={handleSave} className="px-4 py-2 bg-amber-600 text-white text-sm font-semibold rounded-lg hover:bg-amber-700">保存</button>
        </div>
      </div>
    </div>
  );
}

// ========== AI生成プレビュー ==========
function GenerationPreviewModal({ currentShifts, previewShifts, staff, days, dayOff, shiftTypes, aiSettings, onApply, onCancel }) {
  const limit = aiSettings.warnConsecutiveDays || CONSECUTIVE_WORK_LIMIT;
  const consAlerts = useMemo(() => calcConsecutiveAlerts(staff, days, previewShifts, dayOff, limit), [staff, days, previewShifts, dayOff, limit]);
  const vOverlaps = useMemo(() => calcVehicleOverlapAlerts(staff, days, previewShifts), [staff, days, previewShifts]);
  const aOverlaps = useMemo(() => calcAreaOverlapAlerts(staff, days, previewShifts), [staff, days, previewShifts]);
  const consCount = Object.values(consAlerts).reduce((sum, set) => sum + (set.size > 0 ? 1 : 0), 0);
  const vCount = Object.keys(vOverlaps).length;
  const aCount = Object.keys(aOverlaps).length;
  const stats = useMemo(() => {
    let off = 0, req = 0, work = 0;
    Object.values(previewShifts).forEach(v => {
      const norm = normalizeShift(v);
      if (norm === 'reqoff') req++;
      else if (norm === 'off') off++;
      else if (Array.isArray(norm) && norm.some(s => s?.shiftTypeId)) work++;
    });
    return { off, req, work };
  }, [previewShifts]);
  const changeCount = useMemo(() => {
    let count = 0;
    const allKeys = new Set([...Object.keys(currentShifts), ...Object.keys(previewShifts)]);
    allKeys.forEach(k => { if (JSON.stringify(currentShifts[k]) !== JSON.stringify(previewShifts[k])) count++; });
    return count;
  }, [currentShifts, previewShifts]);
  const hasNoAlert = consCount === 0 && vCount === 0 && aCount === 0;

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
      <div className="bg-zinc-800 border border-zinc-700 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
        <div className="flex items-center justify-between p-4 border-b border-zinc-700">
          <div className="flex items-center gap-2"><Icon name="Eye" className="w-5 h-5 text-amber-400" /><h3 className="font-semibold text-zinc-100">生成プレビュー</h3></div>
          <button onClick={onCancel} className="p-1.5 hover:bg-zinc-700 rounded-lg"><Icon name="X" className="w-5 h-5 text-zinc-300" /></button>
        </div>
        <div className="p-4 space-y-3 overflow-y-auto">
          {hasNoAlert && (
            <div className="bg-green-500/10 border border-green-500/30 rounded-lg p-3 flex items-center gap-2">
              <Icon name="ShieldCheck" className="w-5 h-5 text-green-400 flex-shrink-0" />
              <div className="text-sm text-green-300"><strong>ルール厳守完了</strong><div className="text-[11px] text-green-400/80">連勤・被りなし</div></div>
            </div>
          )}
          <div className="bg-zinc-900 rounded-lg p-3">
            <div className="text-xs text-zinc-400 mb-2">生成結果</div>
            <div className="space-y-2">
              <StatRow label="変更されるセル" value={`${changeCount}件`} accent="amber" />
              <StatRow label="勤務" value={`${stats.work}件`} accent="default" />
              <StatRow label="希望休" value={`${stats.req}件`} accent="red" />
              <StatRow label="公休（固定休み含む）" value={`${stats.off}件`} accent="default" />
              <div className="border-t border-zinc-700 pt-2 mt-2 space-y-1">
                <StatRow label={`${limit}連勤発生`} value={consCount > 0 ? `${consCount}名` : 'なし'} accent={consCount > 0 ? 'amber' : 'green'} />
                <StatRow label="号車被り" value={vCount > 0 ? `${vCount}件` : 'なし'} accent={vCount > 0 ? 'orange' : 'green'} />
                <StatRow label="コース被り" value={aCount > 0 ? `${aCount}件` : 'なし'} accent={aCount > 0 ? 'yellow' : 'green'} />
              </div>
            </div>
          </div>
          <div className="bg-zinc-900 rounded-lg p-3">
            <div className="text-xs text-zinc-400 mb-2">適用ルール（優先順）</div>
            <ul className="space-y-1 text-xs text-zinc-300">
              <li>① 希望休を最優先で確定</li>
              <li>② 固定休み曜日は公休</li>
              <li>③ {limit}日目は強制公休（連勤回避）</li>
              <li>④ 号車・コース被りは別区分試行→不可なら公休</li>
              <li>⑤ 既存セルはすべて再計算</li>
            </ul>
          </div>
        </div>
        <div className="p-4 border-t border-zinc-700 flex gap-2">
          <button onClick={onCancel} className="flex-1 py-2 border border-zinc-700 text-zinc-300 rounded-lg text-sm font-medium hover:bg-zinc-700">戻る</button>
          <button onClick={onApply} className="flex-1 py-2 bg-amber-600 text-white rounded-lg text-sm font-semibold hover:bg-amber-700"><Icon name="Check" className="w-4 h-4 inline mr-1" />適用する</button>
        </div>
      </div>
    </div>
  );
}

function StatRow({ label, value, accent }) {
  const c = { amber: 'text-amber-400', red: 'text-red-400', orange: 'text-orange-400', yellow: 'text-yellow-400', green: 'text-green-400', default: 'text-zinc-200' }[accent] || 'text-zinc-200';
  return <div className="flex items-center justify-between text-sm"><span className="text-zinc-400">{label}</span><span className={`font-semibold ${c}`}>{value}</span></div>;
}

function TeamsView({ teams, setTeams, staff, setStaff }) {

    if (data.id && teams.find(t => t.id === data.id)) await setTeams(teams.map(t => t.id === data.id ? data : t));

    setEditing(null);
  };
  const handleDelete = async (t) => {
    const memberCount = staff.filter(s => s.teamId === t.id).length;

    if (!ok) return;
    if (memberCount > 0) await setStaff(staff.map(s => s.teamId === t.id ? { ...s, teamId: '' } : s));

            return (
              <div key={t.id} className="bg-zinc-800 border border-zinc-700 rounded-xl p-3">
                <div className="flex items-center justify-between gap-2">
                  <div className="flex items-center gap-3 flex-1 min-w-0">
                    <span className="w-4 h-4 rounded flex-shrink-0" style={{ background: t.color }}></span>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-sm text-zinc-100 truncate">{t.name}</div>
                      <div className="text-xs text-zinc-500">{members.length}名</div>
                    </div>
                  </div>
                  <div className="flex gap-1">
                    <button onClick={() => setEditing(t)} className="p-1.5 text-zinc-400 hover:bg-zinc-700 rounded"><Icon name="Edit2" className="w-3.5 h-3.5" /></button>
                    <button onClick={() => handleDelete(t)} className="p-1.5 text-red-400 hover:bg-red-900/30 rounded"><Icon name="Trash2" className="w-3.5 h-3.5" /></button>
